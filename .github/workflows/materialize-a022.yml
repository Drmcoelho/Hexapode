name: Materialize A022
on:
  push:
    paths:
      - scripts/materialize_a022.py
      - .github/workflows/materialize-a022.yml
permissions:
  contents: write
jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate A022 assets
        run: python scripts/materialize_a022.py
      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/advanced/A022 manifests/assets.yml
          git commit -m "A022: materialize 10 advanced respiratory anatomy assets" || exit 0
          git push
