<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hilo pulmonar avançado</title><desc id="d">Comparação dos hilos direito e esquerdo com vasos, brônquios e linfáticos.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Hilo pulmonar avançado</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Relações broncovasculares e linfáticas dos hilos pulmonares.</text><ellipse cx="410" cy="545" rx="230" ry="260" fill="#FFFDF8" stroke="#2B2E34" stroke-width="5"/><circle cx="350" cy="430" r="52" fill="#2F6FAE"/><circle cx="470" cy="430" r="52" fill="#1696A3"/><rect x="315" y="540" width="190" height="78" rx="36" fill="#C45A3C"/><circle cx="410" cy="710" r="42" fill="#2E7D69"/><g font-family="Arial" font-size="24" fill="#2B2E34"><text x="290" y="350">artéria pulmonar</text><text x="465" y="350">veias pulmonares</text><text x="350" y="650">brônquio</text><text x="455" y="735">linfático</text></g><rect x="790" y="300" width="680" height="510" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="840" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">RELAÇÕES HILARES</text><text x="840" y="440" font-family="Arial" font-size="25" fill="#2B2E34">• assimetria direita × esquerda</text><text x="840" y="500" font-family="Arial" font-size="25" fill="#2B2E34">• orientação arterial, venosa e brônquica</text><text x="840" y="560" font-family="Arial" font-size="25" fill="#2B2E34">• correlação com mediastino e linfonodos</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-223 · Anatomia Respiratória II Avançada</text></svg>