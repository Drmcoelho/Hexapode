<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Circulação pulmonar avançada</title><desc id="d">Coração direito, artérias pulmonares, capilares alveolares, veias pulmonares e coração esquerdo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Circulação pulmonar avançada</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Circuito de baixa pressão e acoplamento ventilação-perfusão.</text><path d="M220 530 C300 370 360 400 405 520 C450 400 510 370 590 530 C520 690 450 690 405 580 C360 690 290 690 220 530Z" fill="#F4DDD9" stroke="#2B2E34" stroke-width="5"/><path d="M405 520 C500 450 600 400 700 350" stroke="#2F6FAE" stroke-width="22" fill="none"/><path d="M405 580 C500 650 600 700 700 760" stroke="#B2473F" stroke-width="22" fill="none"/><circle cx="760" cy="350" r="54" fill="#2F6FAE"/><circle cx="760" cy="760" r="54" fill="#B2473F"/><text x="825" y="360" font-family="Arial" font-size="24" fill="#2B2E34">artéria pulmonar</text><text x="825" y="770" font-family="Arial" font-size="24" fill="#2B2E34">veias pulmonares</text><rect x="950" y="300" width="520" height="500" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="1000" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">CIRCUITO FUNCIONAL</text><text x="1000" y="440" font-family="Arial" font-size="24" fill="#2B2E34">• ventrículo direito → pulmões</text><text x="1000" y="500" font-family="Arial" font-size="24" fill="#2B2E34">• capilares alveolares → troca gasosa</text><text x="1000" y="560" font-family="Arial" font-size="24" fill="#2B2E34">• veias pulmonares → átrio esquerdo</text><text x="1000" y="620" font-family="Arial" font-size="24" fill="#2B2E34">• distribuição regional dependente da gravidade</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-230 · Anatomia Respiratória II Avançada</text></svg>