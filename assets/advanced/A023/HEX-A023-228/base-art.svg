<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Membrana alvéolo-capilar avançada</title><desc id="d">Corte ampliado da barreira alvéolo-capilar com epitélio, interstício, endotélio e hemácia.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Membrana alvéolo-capilar avançada</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Camadas da barreira, espessura e percurso da difusão.</text><rect x="180" y="330" width="470" height="86" fill="#F4DDD9"/><rect x="180" y="430" width="470" height="68" fill="#E8E1D1"/><rect x="180" y="510" width="470" height="86" fill="#D6E8EA"/><rect x="180" y="610" width="470" height="110" fill="#BFD7EA"/><ellipse cx="415" cy="665" rx="82" ry="46" fill="#B2473F" opacity=".8"/><path d="M350 290V760" stroke="#1696A3" stroke-width="8" stroke-dasharray="18 12"/><text x="690" y="385" font-family="Arial" font-size="24" fill="#2B2E34">epitélio alveolar</text><text x="690" y="475" font-family="Arial" font-size="24" fill="#2B2E34">interstício</text><text x="690" y="565" font-family="Arial" font-size="24" fill="#2B2E34">endotélio capilar</text><text x="690" y="665" font-family="Arial" font-size="24" fill="#2B2E34">sangue / hemácia</text><rect x="970" y="300" width="500" height="470" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="1020" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">BARREIRA DE DIFUSÃO</text><text x="1020" y="440" font-family="Arial" font-size="24" fill="#2B2E34">• espessura mínima fisiológica</text><text x="1020" y="500" font-family="Arial" font-size="24" fill="#2B2E34">• área de troca elevada</text><text x="1020" y="560" font-family="Arial" font-size="24" fill="#2B2E34">• edema e fibrose ampliam distância</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-228 · Anatomia Respiratória II Avançada</text></svg>