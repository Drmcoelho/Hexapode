<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Pneumócito tipo I avançado</title><desc id="d">Célula alveolar pavimentosa extensa formando a superfície de troca gasosa.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Pneumócito tipo I avançado</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Cobertura alveolar, junções e participação na barreira de difusão.</text><path d="M180 610 Q400 280 650 600 Q430 780 180 610Z" fill="#F6E8C4" stroke="#2B2E34" stroke-width="5"/><ellipse cx="415" cy="575" rx="180" ry="48" fill="#2F6FAE" opacity=".65"/><circle cx="415" cy="575" r="34" fill="#123A63"/><path d="M235 610 Q400 690 590 610" fill="none" stroke="#1696A3" stroke-width="10"/><rect x="790" y="300" width="680" height="500" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="840" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">ARQUITETURA CELULAR</text><text x="840" y="440" font-family="Arial" font-size="25" fill="#2B2E34">• célula pavimentosa extremamente delgada</text><text x="840" y="500" font-family="Arial" font-size="25" fill="#2B2E34">• cobre a maior parte da superfície alveolar</text><text x="840" y="560" font-family="Arial" font-size="25" fill="#2B2E34">• integra a barreira ar-sangue</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-225 · Anatomia Respiratória II Avançada</text></svg>