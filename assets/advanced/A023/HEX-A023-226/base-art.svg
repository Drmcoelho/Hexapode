<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Pneumócito tipo II avançado</title><desc id="d">Célula cúbica alveolar com corpos lamelares liberando surfactante.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Pneumócito tipo II avançado</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Corpos lamelares, secreção de surfactante e regeneração epitelial.</text><path d="M250 700 Q405 280 560 700 Q405 800 250 700Z" fill="#F6E8C4" stroke="#2B2E34" stroke-width="5"/><circle cx="405" cy="600" r="74" fill="#C45A3C" opacity=".75"/><circle cx="405" cy="600" r="30" fill="#123A63"/><g fill="#D39A2E"> <circle cx="330" cy="470" r="22"/><circle cx="405" cy="430" r="22"/><circle cx="480" cy="470" r="22"/><circle cx="350" cy="540" r="22"/><circle cx="460" cy="540" r="22"/></g><path d="M330 390 Q405 335 480 390" fill="none" stroke="#1696A3" stroke-width="12"/><rect x="790" y="300" width="680" height="500" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="840" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">FUNÇÃO E REPARO</text><text x="840" y="440" font-family="Arial" font-size="25" fill="#2B2E34">• síntese e secreção de surfactante</text><text x="840" y="500" font-family="Arial" font-size="25" fill="#2B2E34">• corpos lamelares intracitoplasmáticos</text><text x="840" y="560" font-family="Arial" font-size="25" fill="#2B2E34">• progenitor do epitélio alveolar</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-226 · Anatomia Respiratória II Avançada</text></svg>