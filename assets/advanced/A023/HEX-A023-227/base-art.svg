<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Surfactante pulmonar avançado</title><desc id="d">Camada de surfactante comparando estabilidade alveolar e tendência ao colapso.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="76" fill="#123A63"/><text x="70" y="50" font-family="Arial" font-size="28" font-weight="700" fill="white">HEXÁPODE · CAMADA AVANÇADA · A023</text><text x="70" y="155" font-family="Georgia" font-size="58" fill="#2B2E34">Surfactante pulmonar avançado</text><text x="72" y="205" font-family="Arial" font-size="24" fill="#6A727A">Organização molecular e redução da tensão superficial.</text><circle cx="390" cy="545" r="220" fill="#FFFDF8" stroke="#2B2E34" stroke-width="5"/><circle cx="390" cy="545" r="165" fill="#F4DDD9" stroke="#C45A3C" stroke-width="5"/><g stroke="#1696A3" stroke-width="12" fill="none"><path d="M245 400Q270 445 295 400"/><path d="M300 365Q325 410 350 365"/><path d="M360 350Q385 395 410 350"/><path d="M420 360Q445 405 470 360"/><path d="M480 395Q505 440 530 395"/></g><path d="M235 800H545" stroke="#D39A2E" stroke-width="12"/><text x="250" y="850" font-family="Arial" font-size="25" fill="#2B2E34">menor tensão superficial → maior estabilidade</text><rect x="790" y="300" width="680" height="500" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="840" y="370" font-family="Arial" font-size="29" font-weight="700" fill="#123A63">INTERFACE AR-LÍQUIDO</text><text x="840" y="440" font-family="Arial" font-size="25" fill="#2B2E34">• fosfolipídios e proteínas específicas</text><text x="840" y="500" font-family="Arial" font-size="25" fill="#2B2E34">• redução da pressão de colapso</text><text x="840" y="560" font-family="Arial" font-size="25" fill="#2B2E34">• estabilidade em baixos volumes</text><text x="70" y="1125" font-family="Arial" font-size="20" fill="#6A727A">HEX-A023-227 · Anatomia Respiratória II Avançada</text></svg>