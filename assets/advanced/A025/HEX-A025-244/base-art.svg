<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Efeito Bohr</title><desc>Deslocamentos da curva de hemoglobina conforme CO2, pH e temperatura.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect width="1600" height="210" fill="#0F3B63"/><text x="80" y="90" font-family="Arial" font-size="30" fill="white">HEXÁPODE · FISIOLOGIA AVANÇADA</text><text x="80" y="165" font-family="Georgia" font-size="58" fill="white">Efeito Bohr</text><line x1="230" y1="900" x2="1250" y2="900" stroke="#2B2E34" stroke-width="5"/><line x1="230" y1="900" x2="230" y2="300" stroke="#2B2E34" stroke-width="5"/><path d="M260 860 C420 840 500 690 600 480 C720 300 920 300 1200 300" fill="none" stroke="#1D4E7A" stroke-width="12"/><path d="M300 870 C500 850 600 720 700 530 C830 330 1010 330 1280 330" fill="none" stroke="#C45A3C" stroke-width="12"/><text x="900" y="460" font-family="Arial" font-size="31" fill="#C45A3C">direita: ↑CO₂, ↑H⁺, ↑T</text><text x="760" y="250" font-family="Arial" font-size="31" fill="#1D4E7A">esquerda: ↓CO₂, ↓H⁺, ↓T</text><rect x="1040" y="680" width="430" height="170" rx="25" fill="#F8E3DF"/><text x="1080" y="750" font-family="Arial" font-size="28" fill="#B2473F">Direita facilita descarga</text><text x="1080" y="800" font-family="Arial" font-size="28" fill="#B2473F">de O₂ nos tecidos</text><text x="80" y="1135" font-family="Arial" font-size="22" fill="#6A727A">HEX-A025-244</text></svg>