<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Resistência das vias aéreas</title><desc id="d">Efeito do calibre da via aérea sobre a resistência ao fluxo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Resistência das vias aéreas</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Pequenas reduções do raio elevam muito a resistência</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(160 320)"><path d="M100 60 V250 M100 250 L20 420 M100 250 L180 420 M20 420 L0 560 M20 420 L70 560 M180 420 L130 560 M180 420 L230 560" stroke="#1D4E7A" stroke-width="36" fill="none" stroke-linecap="round"/><circle cx="840" cy="310" r="240" fill="#F3E2D8" stroke="#2B2E34" stroke-width="8"/><circle cx="840" cy="310" r="95" fill="#D8EEF0" stroke="#1696A3" stroke-width="8"/><path d="M340 310 H560" stroke="#1696A3" stroke-width="18"/><polygon points="580,310 520,270 520,350" fill="#1696A3"/><text x="650" y="620" font-family="Arial" font-size="30" fill="#2B2E34">resistência ∝ 1 / raio⁴</text></g><text x="90" y="1120" font-family="Arial" font-size="20" fill="#6A727A">HEX-A024-237 · Hexápode · Mecânica Respiratória Avançada</text></svg>