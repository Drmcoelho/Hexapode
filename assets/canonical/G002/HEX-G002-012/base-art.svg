<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Brônquios</title><desc>Brônquios principais e lobares esquemáticos, com assimetria angular.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="70" y="95" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Brônquios</text><text x="72" y="140" font-family="sans-serif" font-size="24" fill="#6A727A">Assimetria dos brônquios principais e divisões lobares</text><g fill="none" stroke-linecap="round"><path d="M800 210 V480" stroke="#1D4E7A" stroke-width="66"/><path d="M800 475 L1070 690" stroke="#1696A3" stroke-width="62"/><path d="M800 475 L560 760" stroke="#1696A3" stroke-width="62"/><path d="M1010 640 L1190 545 M1045 675 L1200 780" stroke="#C45A3C" stroke-width="40"/><path d="M625 685 L430 600 M595 720 L430 820" stroke="#C45A3C" stroke-width="40"/></g><g font-family="sans-serif" font-size="25" fill="#2B2E34"><text x="1110" y="470">Direito: mais curto, largo e vertical</text><text x="140" y="520">Esquerdo: mais longo e oblíquo</text><text x="690" y="1030">Divisões lobares</text></g><text x="70" y="1135" font-family="monospace" font-size="23" fill="#6A727A">HEX-G002-012 · CANONICAL</text></svg>