<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Oferta de oxigênio</title><desc id="d">Prancha sobre DO2, débito cardíaco e conteúdo arterial de oxigênio.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Oferta de oxigênio</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">DO₂ = débito cardíaco × conteúdo arterial de O₂</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(120 300)" font-family="Arial"><rect x="0" y="0" width="390" height="250" rx="28" fill="#E7EEF5" stroke="#1D4E7A" stroke-width="5"/><text x="80" y="80" font-size="30" fill="#1D4E7A">débito cardíaco</text><text x="120" y="155" font-size="44" fill="#2B2E34">FC × VS</text><text x="450" y="145" font-size="54" fill="#2B2E34">×</text><rect x="540" y="0" width="650" height="250" rx="28" fill="#E5F1ED" stroke="#1696A3" stroke-width="5"/><text x="690" y="80" font-size="30" fill="#1696A3">conteúdo arterial de O₂</text><text x="595" y="155" font-size="34" fill="#2B2E34">1,34 × Hb × SaO₂ + 0,003 × PaO₂</text><text x="1240" y="145" font-size="54" fill="#2B2E34">=</text><rect x="1310" y="0" width="160" height="250" rx="28" fill="#E8E1D1"/><text x="1350" y="115" font-size="36" fill="#2B2E34">DO₂</text></g><path d="M180 720 H1380" stroke="#1696A3" stroke-width="22"/><polygon points="1380,720 1330,685 1330,755" fill="#1696A3"/><g font-family="Arial" font-size="28" fill="#2B2E34"><text x="220" y="670">pulmão</text><text x="570" y="670">sangue</text><text x="930" y="670">fluxo</text><text x="1260" y="670">tecido</text></g><rect x="330" y="850" width="940" height="120" rx="22" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="375" y="920" font-family="Arial" font-size="26" fill="#6A727A">PaO₂ influencia pouco o CaO₂ quando comparada à Hb e à saturação.</text><text x="90" y="1115" font-family=