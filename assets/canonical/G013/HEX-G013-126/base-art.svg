<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Curva de Frank-Starling</title><desc id="d">Curva entre pré-carga e volume sistólico.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Curva de Frank-Starling</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Relação entre pré-carga e desempenho sistólico</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><line x1="180" y1="920" x2="1400" y2="920" stroke="#2B2E34" stroke-width="5"/><line x1="180" y1="920" x2="180" y2="320" stroke="#2B2E34" stroke-width="5"/><path d="M210 870 C420 650 650 400 940 360 C1160 330 1280 345 1380 360" fill="none" stroke="#1696A3" stroke-width="16"/><circle cx="520" cy="555" r="18" fill="#2E7D69"/><circle cx="1120" cy="340" r="18" fill="#D39A2E"/><text x="410" y="510" font-family="Arial" font-size="25" fill="#2E7D69">faixa responsiva</text><text x="1090" y="300" font-family="Arial" font-size="25" fill="#D39A2E">platô</text><text x="650" y="995" font-family="Arial" font-size="28" fill="#2B2E34">pré-carga</text><text transform="translate(90 760) rotate(-90)" font-family="Arial" font-size="28" fill="#2B2E34">volume sistólico</text><rect x="930" y="700" width="430" height="130" rx="22" fill="#E8E1D1"/><text x="965" y="760" font-family="Arial" font-size="24" fill="#6A727A">Mais volume nem sempre gera</text><text x="965" y="800" font-family="Arial" font-size="24" fill="#6A727A">ganho hemodinâmico relevante.</text><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-126 · Hexápode · Hemodinâmica</text></svg>