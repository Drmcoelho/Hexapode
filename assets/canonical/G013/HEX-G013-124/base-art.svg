<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Pressão arterial média</title><desc id="d">Prancha vetorial sobre PAM, perfusão e componentes pulsátil e contínuo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Pressão arterial média</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Pressão efetiva que impulsiona o fluxo sistêmico</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><path d="M120 570 C210 300 300 760 390 410 S570 760 660 420 S840 710 930 470 S1110 690 1200 500 S1380 650 1480 520" fill="none" stroke="#1D4E7A" stroke-width="14"/><line x1="120" y1="560" x2="1480" y2="560" stroke="#D39A2E" stroke-width="6" stroke-dasharray="22 16"/><text x="1240" y="540" font-family="Arial" font-size="26" fill="#D39A2E">PAM</text><g font-family="Arial" font-size="28" fill="#2B2E34"><text x="160" y="800">PAM ≈ PAD + ⅓(PAS − PAD)</text><text x="160" y="880">Fluxo ≈ gradiente de pressão ÷ resistência</text></g><rect x="980" y="760" width="450" height="160" rx="24" fill="#E8E1D1"/><text x="1015" y="820" font-family="Arial" font-size="25" fill="#6A727A">Alvo depende do contexto clínico,</text><text x="1015" y="860" font-family="Arial" font-size="25" fill="#6A727A">autorregulação e órgão vulnerável.</text><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-124 · Hexápode · Hemodinâmica</text></svg>