<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Débito cardíaco</title><desc id="d">Relação entre frequência cardíaca, volume sistólico e débito.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Débito cardíaco</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">DC = FC × VS</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(130 300)"><circle cx="260" cy="260" r="190" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M260 100 C150 120 140 270 225 390 C300 350 370 245 365 130 C330 110 295 100 260 100Z" fill="#C45A3C" opacity=".85"/><path d="M450 260 H690" stroke="#1696A3" stroke-width="22"/><polygon points="690,260 640,225 640,295" fill="#1696A3"/><text x="70" y="520" font-family="Arial" font-size="30" fill="#2B2E34">FC × volume sistólico</text></g><g transform="translate(850 305)"><rect width="610" height="560" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="45" y="80" font-family="Arial" font-size="31" font-weight="700" fill="#1D4E7A">DETERMINANTES</text><text x="55" y="170" font-family="Arial" font-size="27" fill="#2B2E34">pré-carga · contratilidade</text><text x="55" y="245" font-family="Arial" font-size="27" fill="#2B2E34">pós-carga · frequência · ritmo</text><line x1="55" y1="300" x2="555" y2="300" stroke="#DCD2BE" stroke-width="3"/><text x="55" y="385" font-family="Arial" font-size="27" fill="#2E7D69">Oferta adequada</text><text x="330" y="385" font-family="Arial" font-size="27" fill="#2B2E34">depende também de Hb e SaO₂</text></g><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-123 · Hexápode · Hemodinâmica</text></svg>