<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Pré-carga</title><desc id="d">Prancha vetorial sobre pré-carga, retorno venoso e volume diastólico final.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Pré-carga</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Volume que distende o ventrículo ao fim da diástole</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(150 300)"><ellipse cx="260" cy="260" rx="190" ry="230" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M260 90 C170 150 155 265 220 390 C280 330 330 245 345 135 C320 110 295 95 260 90Z" fill="#C45A3C" opacity=".82"/><path d="M25 260 H110" stroke="#1696A3" stroke-width="18"/><polygon points="110,260 75,238 75,282" fill="#1696A3"/><text x="0" y="215" font-family="Arial" font-size="26" fill="#1696A3">retorno venoso</text><text x="170" y="545" font-family="Arial" font-size="28" fill="#2B2E34">volume diastólico final</text></g><g transform="translate(760 320)"><rect x="0" y="0" width="700" height="590" rx="26" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="40" y="70" font-family="Arial" font-size="30" font-weight="700" fill="#1D4E7A">CADEIA CAUSAL</text><g font-family="Arial" font-size="28" fill="#2B2E34"><text x="60" y="165">Retorno venoso</text><text x="285" y="165">→</text><text x="345" y="165">VDF</text><text x="470" y="165">→</text><text x="535" y="165">estiramento</text><text x="60" y="270">Pré-carga adequada</text><text x="365" y="270">→</text><text x="430" y="270">maior força</text><text x="60" y="410">Não equivale automaticamente a responsividade a volume.</text></g><rect x="50" y="455" width="600" height="90" rx="18" fill="#E8E1D1"/><text x="80" y="512" font-family="Arial" font-size="24" fill="#6A727A">Use tendências, contexto e resposta dinâmica.</text></g><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-121 · Hexápode · Hemodinâmica</text></svg>