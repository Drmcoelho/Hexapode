<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Pós-carga</title><desc id="d">Prancha sobre resistência à ejeção ventricular.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Pós-carga</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Carga que o ventrículo precisa vencer para ejetar sangue</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(140 290)"><path d="M290 80 C170 130 120 260 180 420 C260 530 410 500 470 380 C530 260 470 120 360 80Z" fill="#C45A3C" opacity=".8" stroke="#2B2E34" stroke-width="6"/><path d="M460 240 H760" stroke="#1D4E7A" stroke-width="24"/><polygon points="760,240 710,205 710,275" fill="#1D4E7A"/><rect x="660" y="130" width="55" height="220" rx="20" fill="#D39A2E"/><text x="600" y="95" font-family="Arial" font-size="27" fill="#D39A2E">resistência</text><text x="90" y="570" font-family="Arial" font-size="28" fill="#2B2E34">pressão arterial · impedância · geometria ventricular</text></g><g transform="translate(930 320)"><rect width="530" height="540" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="35" y="70" font-family="Arial" font-size="30" font-weight="700" fill="#1D4E7A">EFEITO</text><text x="45" y="155" font-family="Arial" font-size="27" fill="#2B2E34">↑ pós-carga</text><text x="220" y="155" font-family="Arial" font-size="27" fill="#2B2E34">→ ↓ volume sistólico</text><text x="45" y="245" font-family="Arial" font-size="27" fill="#2B2E34">↑ tensão parietal</text><text x="45" y="335" font-family="Arial" font-size="27" fill="#2B2E34">↑ consumo de O₂ miocárdico</text><rect x="35" y="405" width="460" height="90" rx="18" fill="#E8E1D1"/><text x="60" y="462" font-family="Arial" font-size="23" fill="#6A727A">Não é sinônimo isolado de pressão arterial.</text></g><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-122 · Hexápode · Hemodinâmica</text></svg>