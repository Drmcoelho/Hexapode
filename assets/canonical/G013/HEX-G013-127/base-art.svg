<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Vasoplegia</title><desc id="d">Prancha sobre perda de tônus vascular e vasodilatação distributiva.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Vasoplegia</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Perda de tônus vascular com resistência sistêmica inadequadamente baixa</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(130 320)"><rect x="0" y="80" width="550" height="170" rx="85" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><rect x="40" y="120" width="470" height="90" rx="45" fill="#B2473F" opacity=".65"/><text x="160" y="55" font-family="Arial" font-size="28" fill="#2B2E34">vaso dilatado</text><path d="M80 380 H470" stroke="#1696A3" stroke-width="22"/><polygon points="470,380 420,345 420,415" fill="#1696A3"/><text x="150" y="445" font-family="Arial" font-size="26" fill="#1696A3">fluxo redistribuído</text></g><g transform="translate(830 300)"><rect width="600" height="570" rx="28" fill="#FFFDF8" stroke="#DCD2BE" stroke-width="4"/><text x="40" y="80" font-family="Arial" font-size="30" font-weight="700" fill="#B2473F">FENÓTIPO</text><text x="55" y="170" font-family="Arial" font-size="27" fill="#2B2E34">↓ resistência vascular sistêmica</text><text x="55" y="250" font-family="Arial" font-size="27" fill="#2B2E34">hipotensão apesar de débito preservado</text><text x="55" y="330" font-family="Arial" font-size="27" fill="#2B2E34">maldistribuição do fluxo</text><rect x="45" y="405" width="510" height="110" rx="18" fill="#F3E2D8"/><text x="75" y="465" font-family="Arial" font-size="24" fill="#B2473F">Requer tratar causa e restaurar tônus.</text></g><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-127 · Hexápode · Hemodinâmica</text></svg>