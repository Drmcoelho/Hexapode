<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Retorno venoso</title><desc id="d">Prancha sobre gradiente de retorno venoso e pressão atrial direita.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Retorno venoso</text><text x="90" y="170" font-family="Arial" font-size="24" fill="#6A727A">Fluxo de volta ao coração determinado por gradiente e resistência</text><line x1="90" y1="205" x2="1510" y2="205" stroke="#DCD2BE" stroke-width="3"/><g transform="translate(120 320)"><circle cx="230" cy="250" r="145" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><text x="135" y="260" font-family="Arial" font-size="27" fill="#2B2E34">circulação</text><path d="M380 250 H950" stroke="#1696A3" stroke-width="20"/><polygon points="950,250 900,215 900,285" fill="#1696A3"/><path d="M950 250 C1100 260 1120 430 960 500" fill="none" stroke="#1696A3" stroke-width="20"/><polygon points="950,500 1000,465 1000,535" fill="#1696A3"/><path d="M960 500 H380" stroke="#1696A3" stroke-width="20"/><polygon points="380,500 430,465 430,535" fill="#1696A3"/><text x="520" y="205" font-family="Arial" font-size="27" fill="#1D4E7A">Pms</text><text x="880" y="560" font-family="Arial" font-size="27" fill="#C45A3C">PAD</text></g><g font-family="Arial" fill="#2B2E34"><text x="220" y="900" font-size="32">Retorno venoso ∝ (Pms − PAD) ÷ resistência venosa</text><text x="220" y="970" font-size="25" fill="#6A727A">Aumento da PAD sem aumento da Pms reduz o gradiente de retorno.</text></g><text x="90" y="1115" font-family="Arial" font-size="20" fill="#6A727A">HEX-G013-125 · Hexápode · Hemodinâmica</text></svg>