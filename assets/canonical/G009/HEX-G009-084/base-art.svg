<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Ineffective Trigger</title><desc id="d">Esforços inspiratórios do paciente não conseguem disparar o ventilador.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Ineffective Trigger</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">ESFORÇO NÃO ASSISTIDO</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="290" width="970" height="680" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><line x1="140" y1="600" x2="970" y2="600" stroke="#6A727A"/><path d="M140 600 L260 600 C285 600 300 555 325 555 C350 555 365 600 390 600 L500 600 C525 600 540 555 565 555 C590 555 605 600 630 600 L760 600" fill="none" stroke="#C45A3C" stroke-width="7"/><path d="M140 790 L760 790" stroke="#1D4E7A" stroke-width="7"/><text x="170" y="900" font-family="Arial" font-size="22" fill="#B2473F">Deflexões de esforço sem ciclo ventilatório subsequente</text><rect x="1090" y="290" width="430" height="680" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1130" y="360" font-family="Arial" font-size="24" font-weight="700" fill="#2B2E34">CAUSAS PROVÁVEIS</text><text x="1130" y="450" font-family="Arial" font-size="22" fill="#2B2E34">• Auto-PEEP</text><text x="1130" y="510" font-family="Arial" font-size="22" fill="#2B2E34">• Trigger pouco sensível</text><text x="1130" y="570" font-family="Arial" font-size="22" fill="#2B2E34">• Fraqueza muscular</text><text x="1130" y="630" font-family="Arial" font-size="22" fill="#2B2E34">• Sedação excessiva</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-084 · ativo canônico · Ventila · Respira · Emergências</text></svg>