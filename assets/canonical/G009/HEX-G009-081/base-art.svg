<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Auto-trigger</title><desc id="d">Prancha vetorial mostrando disparos do ventilador sem esforço inspiratório efetivo do paciente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="42" y="42" width="1516" height="1116" rx="18" fill="none" stroke="#DCD2BE" stroke-width="2"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Auto-trigger</text><text x="88" y="168" font-family="Arial" font-size="24" letter-spacing="3" fill="#B2473F">ASSINCRONIA DE DISPARO</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="75" y="285" width="930" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="110" y="345" font-family="Arial" font-size="24" font-weight="700" fill="#2B2E34">PRESSÃO / FLUXO / ESFORÇO</text><line x1="130" y1="520" x2="930" y2="520" stroke="#6A727A" stroke-width="2"/><path d="M130 520 L245 520 L270 455 L330 520 L420 520 L445 455 L505 520 L600 520 L625 455 L685 520 L780 520 L805 455 L865 520" fill="none" stroke="#1D4E7A" stroke-width="7"/><path d="M130 720 C230 720 260 745 330 720 C430 720 470 745 540 720 C650 720 690 745 760 720 C850 720 890 745 930 720" fill="none" stroke="#C45A3C" stroke-width="5" stroke-dasharray="14 12"/><text x="130" y="795" font-family="Arial" font-size="21" fill="#C45A3C">Esforço ausente ou insuficiente</text><rect x="1050" y="285" width="480" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1090" y="345" font-family="Arial" font-size="24" font-weight="700" fill="#2B2E34">MECANISMOS</text><text x="1090" y="430" font-family="Arial" font-size="22" fill="#2B2E34">• Sensibilidade excessiva</text><text x="1090" y="490" font-family="Arial" font-size="22" fill="#2B2E34">• Vazamento no circuito</text><text x="1090" y="550" font-family="Arial" font-size="22" fill="#2B2E34">• Condensado / oscilação</text><text x="1090" y="650" font-family="Arial" font-size="22" fill="#B2473F">Sinal-chave:</text><text x="1090" y="700" font-family="Arial" font-size="21" fill="#2B2E34">ciclo iniciado sem deflexão</text><text x="1090" y="735" font-family="Arial" font-size="21" fill="#2B2E34">prévia compatível com esforço.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-081 · ativo canônico · Ventila · Respira · Emergências</text></svg>