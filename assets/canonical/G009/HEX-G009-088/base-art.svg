<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Breath Stacking</title><desc>Acúmulo de volumes por ciclos consecutivos sem expiração completa.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Breath Stacking</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">EMPILHAMENTO DE VOLUME</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="300" width="1000" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="120" y="370" font-family="Arial" font-size="24" font-weight="700">VOLUME × TEMPO</text><path d="M150 820 L260 820 C300 820 330 650 480 620 L520 620 C560 620 590 470 760 440 L850 440 C900 500 920 650 950 820" fill="none" stroke="#C45A3C" stroke-width="9"/><line x1="150" y1="820" x2="960" y2="820" stroke="#6A727A"/><text x="250" y="900" font-family="Arial" font-size="22" fill="#B2473F">Segundo ciclo começa antes do retorno à linha de base</text><rect x="1120" y="300" width="390" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1160" y="380" font-family="Arial" font-size="24" font-weight="700">RISCO MECÂNICO</text><text x="1160" y="480" font-family="Arial" font-size="22">• Vt total elevado</text><text x="1160" y="540" font-family="Arial" font-size="22">• Pressão alveolar maior</text><text x="1160" y="600" font-family="Arial" font-size="22">• Volutrauma potencial</text><text x="1160" y="700" font-family="Arial" font-size="22" fill="#D39A2E">Investigar trigger,</text><text x="1160" y="740" font-family="Arial" font-size="22" fill="#D39A2E">ciclagem e drive.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-088 · ativo canônico · Ventila · Respira · Emergências</text></svg>