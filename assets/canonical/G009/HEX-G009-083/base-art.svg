l="#B2473F">O ciclo mandatório</text><text x="1140" y="720" font-family="Arial" font-size="22" fill="#B2473F">dispara o paciente.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-083 · ativo canônico · Ventila · Respira · Emergências</text></svg>