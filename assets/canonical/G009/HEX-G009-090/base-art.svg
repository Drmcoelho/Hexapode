<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Soluções para Assincronias</title><desc>Matriz de reconhecimento e correção das principais assincronias paciente-ventilador.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="58" fill="#2B2E34">Hexápode — Soluções para Assincronias</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#2E7D69">RECONHECER → EXPLICAR → CORRIGIR → REAVALIAR</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="270" width="1440" height="720" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="120" y="335" font-family="Arial" font-size="23" font-weight="700">PADRÃO</text><text x="430" y="335" font-family="Arial" font-size="23" font-weight="700">CAUSA DOMINANTE</text><text x="820" y="335" font-family="Arial" font-size="23" font-weight="700">AJUSTE INICIAL</text><text x="1200" y="335" font-family="Arial" font-size="23" font-weight="700">REAVALIAÇÃO</text><g font-family="Arial" font-size="20" fill="#2B2E34"><text x="120" y="420">Auto-trigger</text><text x="430" y="420">vazamento / sensibilidade</text><text x="820" y="420">corrigir circuito e trigger</text><text x="1200" y="420">ciclos sem esforço?</text><text x="120" y="500">Ineffective trigger</text><text x="430" y="500">auto-PEEP / fraqueza</text><text x="820" y="500">PEEP, trigger, mecânica</text><text x="1200" y="500">esforços capturados?</text><text x="120" y="580">Flow starvation</text><text x="430" y="580">demanda &gt; oferta</text><text x="820" y="580">fluxo / rise time / modo</text><text x="1200" y="580">pressão sem concavidade?</text><text x="120" y="660">Ciclagem precoce</text><text x="430" y="660">Ti menor que esforço</text><text x="820" y="660">prolongar ciclo</text><text x="1200" y="660">sem novo disparo?</text><text x="120" y="740">Ciclagem tardia</text><text x="430" y="740">Ti maior que esforço</text><text x="820" y="740">encurtar ciclo</text><text x="1200" y="740">sem expiração ativa?</text><text x="120" y="820">Breath stacking</text><text x="430" y="820">trigger/ciclagem/drive</text><text x="820" y="820">corrigir mecanismo</text><text x="1200" y="820">Vt total seguro?</text></g><g stroke="#DCD2BE"><line x1="105" y1="450" x2="1490" y2="450"/><line x1="105" y1="530" x2="1490" y2="530"/><line x1="105" y1="610" x2="1490" y2="610"/><line x1="105" y1="690" x2="1490" y2="690"/><line x1="105" y1="770" x2="1490" y2="770"/></g><rect x="270" y="1020" width="1060" height="65" rx="15" fill="#E8E1D1" stroke="#2E7D69"/><text x="325" y="1062" font-family="Arial" font-size="22" fill="#2E7D69">Trate o mecanismo, não apenas a curva: paciente, ventilador e circuito formam um sistema.</text><text x="90" y="1140" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-090 · ativo canônico · aplicação transversal</text></svg>