<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Auto-PEEP dinâmica</title><desc>Fluxo expiratório não retorna a zero e o volume pulmonar cresce progressivamente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Auto-PEEP dinâmica</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">APRISIONAMENTO AÉREO PROGRESSIVO</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="300" width="1000" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><line x1="150" y1="620" x2="970" y2="620" stroke="#6A727A" stroke-width="2"/><path d="M150 620 L240 620 L240 500 L360 500 C390 550 410 680 470 680 L500 680 L500 500 L620 500 C650 550 670 700 730 700 L760 700 L760 500 L880 500 C910 550 930 720 970 720" fill="none" stroke="#1696A3" stroke-width="8"/><path d="M190 850 L420 805 L680 755 L940 700" fill="none" stroke="#C45A3C" stroke-width="8"/><text x="250" y="900" font-family="Arial" font-size="22" fill="#B2473F">Expiração incompleta + aumento do volume expiratório final</text><rect x="1120" y="300" width="390" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1160" y="380" font-family="Arial" font-size="24" font-weight="700">INTERVENÇÕES</text><text x="1160" y="480" font-family="Arial" font-size="22">• Reduzir FR</text><text x="1160" y="540" font-family="Arial" font-size="22">• Aumentar fluxo</text><text x="1160" y="600" font-family="Arial" font-size="22">• Encurtar Ti</text><text x="1160" y="660" font-family="Arial" font-size="22">• Tratar obstrução</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-089 · ativo canônico · Ventila · Respira · Emergências</text></svg>