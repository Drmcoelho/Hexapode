<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Ciclagem precoce</title><desc>Fluxo inspiratório termina antes do esforço neural do paciente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Ciclagem precoce</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">INSPIRAÇÃO MECÂNICA CURTA</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="300" width="1000" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><path d="M150 680 L270 680 L270 520 L510 520 L510 680 L820 680" fill="none" stroke="#1696A3" stroke-width="8"/><path d="M150 800 C260 800 275 610 600 610 C670 610 720 680 770 800" fill="none" stroke="#C45A3C" stroke-width="7"/><line x1="510" y1="440" x2="510" y2="840" stroke="#D39A2E" stroke-width="4" stroke-dasharray="12 10"/><text x="430" y="420" font-family="Arial" font-size="22" fill="#D39A2E">ciclagem</text><text x="260" y="895" font-family="Arial" font-size="22" fill="#B2473F">Esforço continua após o fim do fluxo inspiratório</text><rect x="1120" y="300" width="390" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1160" y="380" font-family="Arial" font-size="24" font-weight="700">CONSEQUÊNCIAS</text><text x="1160" y="480" font-family="Arial" font-size="22">• Desconforto</text><text x="1160" y="540" font-family="Arial" font-size="22">• Double trigger</text><text x="1160" y="600" font-family="Arial" font-size="22">• Volume empilhado</text><text x="1160" y="700" font-family="Arial" font-size="22" fill="#2E7D69">Ajustar critério de</text><text x="1160" y="740" font-family="Arial" font-size="22" fill="#2E7D69">ciclagem / tempo.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-086 · ativo canônico · Ventila · Respira</text></svg>