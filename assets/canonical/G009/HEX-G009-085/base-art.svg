<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Flow Starvation</title><desc>Demanda inspiratória excede o fluxo ofertado, com concavidade da pressão e esforço persistente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Flow Starvation</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">FLUXO INSUFICIENTE</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="290" width="980" height="680" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="120" y="355" font-family="Arial" font-size="24" font-weight="700">PRESSÃO E FLUXO</text><path d="M150 570 L260 570 C300 570 330 470 440 510 C520 540 600 500 700 570" fill="none" stroke="#B2473F" stroke-width="8"/><path d="M150 760 L260 760 L260 675 L650 675 L650 760" fill="none" stroke="#1696A3" stroke-width="8"/><path d="M300 650 C380 580 500 575 620 650" fill="none" stroke="#C45A3C" stroke-width="5" stroke-dasharray="14 10"/><text x="180" y="875" font-family="Arial" font-size="22" fill="#B2473F">Pressão côncava: paciente “puxa” além do fluxo entregue</text><rect x="1100" y="290" width="420" height="680" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1140" y="360" font-family="Arial" font-size="24" font-weight="700">CORREÇÕES</text><text x="1140" y="460" font-family="Arial" font-size="22">• Aumentar fluxo</text><text x="1140" y="520" font-family="Arial" font-size="22">• Ajustar rise time</text><text x="1140" y="580" font-family="Arial" font-size="22">• Rever drive e demanda</text><text x="1140" y="640" font-family="Arial" font-size="22">• Considerar modo</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-085 · ativo canônico · Ventila · Respira · Emergências</text></svg>