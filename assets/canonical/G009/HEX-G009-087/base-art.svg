<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img"><title>Hexápode — Ciclagem tardia</title><desc>Fluxo inspiratório persiste após o término do esforço neural do paciente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Ciclagem tardia</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#B2473F">INSPIRAÇÃO MECÂNICA PROLONGADA</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><rect x="80" y="300" width="1000" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><path d="M150 680 L270 680 L270 520 L760 520 L760 680 L850 680" fill="none" stroke="#1696A3" stroke-width="8"/><path d="M150 800 C260 800 275 610 520 610 C590 610 620 690 660 800" fill="none" stroke="#C45A3C" stroke-width="7"/><line x1="620" y1="440" x2="620" y2="840" stroke="#D39A2E" stroke-width="4" stroke-dasharray="12 10"/><text x="530" y="420" font-family="Arial" font-size="22" fill="#D39A2E">fim do esforço</text><text x="250" y="895" font-family="Arial" font-size="22" fill="#B2473F">Fluxo continua e o paciente tenta expirar contra o ventilador</text><rect x="1120" y="300" width="390" height="650" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="1160" y="380" font-family="Arial" font-size="24" font-weight="700">PISTAS</text><text x="1160" y="480" font-family="Arial" font-size="22">• Pico pressórico final</text><text x="1160" y="540" font-family="Arial" font-size="22">• Expiração ativa</text><text x="1160" y="600" font-family="Arial" font-size="22">• Tempo inspiratório longo</text><text x="1160" y="700" font-family="Arial" font-size="22" fill="#2E7D69">Aumentar % de</text><text x="1160" y="740" font-family="Arial" font-size="22" fill="#2E7D69">ciclagem em PSV.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G009-087 · ativo canônico · Ventila · Respira</text></svg>