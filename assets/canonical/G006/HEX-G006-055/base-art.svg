<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">HEX-G006-055 — Máscara facial</title><desc id="d">Máscara facial esquemática com almofada, cotovelo e tirantes.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-family="Georgia,serif" font-size="58" fill="#2B2E34">Máscara facial</text><text x="92" y="158" font-family="Arial" font-size="24" fill="#6A727A">interface não invasiva • vedação • conexão</text><line x1="90" y1="190" x2="1510" y2="190" stroke="#DCD2BE" stroke-width="3"/><path d="M790 280 Q980 330 1060 560 Q1090 760 900 860 Q690 880 570 680 Q520 470 650 340 Q710 285 790 280Z" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M700 420 Q820 345 930 430 L900 680 Q800 760 680 670Z" fill="#1696A3" opacity=".25" stroke="#1696A3" stroke-width="10"/><circle cx="805" cy="555" r="58" fill="#1D4E7A"/><path d="M805 555 H1210" stroke="#1D4E7A" stroke-width="40"/><path d="M610 410 H410 M590 730 H390 M980 430 H1190 M990 720 H1210" stroke="#6A727A" stroke-width="18"/><g font-family="Arial" font-size="28" fill="#2B2E34"><text x="650" y="960">almofada de vedação</text><text x="1130" y="515">cotovelo/conector</text><text x="250" y="600">tirantes</text></g><rect x="230" y="1020" width="1140" height="85" rx="18" fill="#E8E1D1"/><text x="300" y="1075" font-family="Arial" font-size="25" fill="#6A727A">A função depende de interface, conforto, estabilidade e ausência de vazamento relevante.</text></svg>