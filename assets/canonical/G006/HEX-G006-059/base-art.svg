<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">HEX-G006-059 — HME</title><desc id="d">Trocador de calor e umidade esquemático entre circuito e via aérea.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-family="Georgia,serif" font-size="58" fill="#2B2E34">HME</text><text x="92" y="158" font-family="Arial" font-size="24" fill="#6A727A">retenção de calor e umidade • conexão entre circuito e via aérea</text><line x1="90" y1="190" x2="1510" y2="190" stroke="#DCD2BE" stroke-width="3"/><line x1="220" y1="600" x2="520" y2="600" stroke="#1D4E7A" stroke-width="42"/><rect x="520" y="420" width="540" height="360" rx="44" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M600 500 H980 M600 570 H980 M600 640 H980 M600 710 H980" stroke="#1696A3" stroke-width="22" stroke-dasharray="18 18"/><line x1="1060" y1="600" x2="1370" y2="600" stroke="#C45A3C" stroke-width="42"/><polygon points="450,560 520,600 450,640" fill="#1696A3"/><polygon points="1130,560 1060,600 1130,640" fill="#C45A3C"/><g font-family="Arial" font-size="28" fill="#2B2E34"><text x="245" y="540">circuito</text><text x="680" y="370">meio higroscópico</text><text x="1190" y="540">via aérea</text><text x="540" y="865">inspiração: calor/umidade retornam</text><text x="540" y="925">expiração: calor/umidade são retidos</text></g><rect x="270" y="1015" width="1060" height="80" rx="18" fill="#E8E1D1"/><text x="330" y="1066" font-family="Arial" font-size="25" fill="#6A727A">Esquema funcional; resistência adicional e espaço morto devem ser considerados.</text></svg>