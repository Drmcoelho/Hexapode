<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">HEX-G006-052 — Circuito</title><desc id="d">Circuito respiratório com ramo inspiratório, ramo expiratório, peça Y e conexões.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-family="Georgia,serif" font-size="58" fill="#2B2E34">Circuito respiratório</text><text x="92" y="158" font-family="Arial" font-size="24" fill="#6A727A">trajeto inspiratório e expiratório até a peça Y</text><line x1="90" y1="190" x2="1510" y2="190" stroke="#DCD2BE" stroke-width="3"/><rect x="140" y="350" width="250" height="420" rx="26" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="8"/><text x="205" y="570" font-family="Arial" font-size="30" fill="#1D4E7A">VENTILADOR</text><path d="M390 430 C620 300 850 320 1080 470" fill="none" stroke="#1696A3" stroke-width="34" stroke-dasharray="28 18"/><path d="M390 690 C620 830 850 810 1080 560" fill="none" stroke="#1D4E7A" stroke-width="34" stroke-dasharray="28 18"/><path d="M1080 470 L1190 515 L1080 560" fill="none" stroke="#2B2E34" stroke-width="24"/><line x1="1190" y1="515" x2="1360" y2="515" stroke="#C45A3C" stroke-width="26"/><polygon points="750,390 810,420 750,450" fill="#1696A3"/><polygon points="750,770 690,740 750,710" fill="#1D4E7A"/><g font-family="Arial" font-size="26" fill="#2B2E34"><text x="600" y="285">ramo inspiratório</text><text x="610" y="910">ramo expiratório</text><text x="1100" y="420">peça Y</text><text x="1275" y="470">paciente</text></g><rect x="280" y="980" width="1040" height="110" rx="18" fill="#E8E1D1"/><text x="330" y="1045" font-family="Arial" font-size="27" fill="#6A727A">Setas e cores indicam direção funcional; conexões devem permanecer inequívocas.</text></svg>