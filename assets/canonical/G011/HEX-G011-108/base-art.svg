<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Máscara laríngea</title><desc id="d">Dispositivo supraglótico posicionado sobre a entrada da laringe.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Máscara Laríngea</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Dispositivo supraglótico · ventilação de resgate e via aérea planejada</text><path d="M940 220 Q1240 340 1300 620 Q1260 910 960 960 Q720 860 700 600 Q740 350 940 220" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M760 580 Q900 500 1040 580 Q900 690 760 580" fill="#C45A3C"/><ellipse cx="900" cy="610" rx="180" ry="120" fill="#1696A3" opacity=".55" stroke="#1696A3" stroke-width="10"/><path d="M240 900 Q500 720 760 620" fill="none" stroke="#1D4E7A" stroke-width="58" stroke-linecap="round"/><g font-family="sans-serif"><text x="160" y="320" font-size="30" fill="#1D4E7A">Pontos-chave</text><text x="160" y="390" font-size="25" fill="#2B2E34">• Sela a hipofaringe sem atravessar as cordas.</text><text x="160" y="445" font-size="25" fill="#2B2E34">• Útil como resgate em falha de ventilação.</text><text x="160" y="500" font-size="25" fill="#2B2E34">• Pode servir como conduto para intubação.</text><rect x="140" y="620" width="520" height="190" rx="24" fill="#E8E1D1"/><text x="180" y="685" font-size="25" fill="#D39A2E">Limitações</text><text x="180" y="735" font-size="22" fill="#2B2E34">Vedação e proteção contra aspiração</text><text x="180" y="775" font-size="22" fill="#2B2E34">dependem do modelo e do contexto.</text></g></svg>