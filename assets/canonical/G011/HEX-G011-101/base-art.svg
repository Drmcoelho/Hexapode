<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Mallampati</title><desc id="d">Comparação esquemática das classes I a IV de Mallampati.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Mallampati</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Avaliação orofaríngea esquemática · classes I–IV</text><g font-family="sans-serif" text-anchor="middle"><g transform="translate(250 350)"><circle r="150" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-90 20 Q0 100 90 20" fill="#C45A3C"/><path d="M0 -70 v110" stroke="#1696A3" stroke-width="18"/><text y="230" font-size="32">Classe I</text><text y="270" font-size="21" fill="#6A727A">palato, úvula e pilares visíveis</text></g><g transform="translate(600 350)"><circle r="150" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-90 30 Q0 105 90 30" fill="#C45A3C"/><path d="M0 -45 v75" stroke="#1696A3" stroke-width="18"/><text y="230" font-size="32">Classe II</text><text y="270" font-size="21" fill="#6A727A">úvula parcialmente visível</text></g><g transform="translate(950 350)"><circle r="150" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-95 5 Q0 115 95 5" fill="#C45A3C"/><path d="M0 -20 v35" stroke="#1696A3" stroke-width="18"/><text y="230" font-size="32">Classe III</text><text y="270" font-size="21" fill="#6A727A">apenas base da úvula</text></g><g transform="translate(1300 350)"><circle r="150" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-110 -15 Q0 125 110 -15" fill="#C45A3C"/><text y="230" font-size="32">Classe IV</text><text y="270" font-size="21" fill="#6A727A">somente palato duro</text></g></g><rect x="100" y="760" width="1400" height="250" rx="28" fill="#E8E1D1"/><text x="150" y="830" font-family="sans-serif" font-size="30" fill="#1D4E7A">Leitura clínica</text><text x="150" y="885" font-family="sans-serif" font-size="25" fill="#2B2E34">Maior classe sugere menor visibilidade orofaríngea, mas não prediz isoladamente dificuldade de laringoscopia.</text><text x="150" y="940" font-family="sans-serif" font-size="22" fill="#6A727A">Integrar abertura oral, mobilidade cervical, distância tireomentoniana e contexto clínico.</text></svg>