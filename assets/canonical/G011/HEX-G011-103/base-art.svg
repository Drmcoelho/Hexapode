<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">BURP</title><desc id="d">Aplicação esquemática de pressão posterior, superior e para a direita sobre a laringe.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — BURP</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Backward · Upward · Rightward Pressure</text><path d="M400 300 Q300 500 410 780 Q540 920 730 760 Q800 650 700 500 Q620 360 400 300" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><rect x="520" y="430" width="110" height="300" rx="50" fill="#1696A3"/><circle cx="575" cy="500" r="55" fill="#C45A3C"/><g stroke="#D39A2E" stroke-width="18" fill="none" marker-end="url(#a)"><path d="M1050 680 Q820 650 650 590"/><path d="M850 900 Q760 760 640 620"/><path d="M1130 420 Q900 440 650 530"/></g><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#D39A2E"/></marker></defs><g font-family="sans-serif" font-size="32" fill="#2B2E34"><text x="1070" y="700">Posterior</text><text x="820" y="950">Superior</text><text x="1150" y="430">Direita do paciente</text></g><rect x="900" y="520" width="520" height="260" rx="28" fill="#E8E1D1"/><text x="950" y="590" font-family="sans-serif" font-size="30" fill="#1D4E7A">Objetivo</text><text x="950" y="650" font-family="sans-serif" font-size="24" fill="#2B2E34">Reposicionar a laringe para melhorar</text><text x="950" y="690" font-family="sans-serif" font-size="24" fill="#2B2E34">a visualização durante laringoscopia.</text><text x="950" y="750" font-family="sans-serif" font-size="21" fill="#B2473F">Não confundir com pressão cricoide.</text></svg>