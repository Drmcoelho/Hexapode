<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Videolaringoscopia</title><desc id="d">Videolaringoscópio esquemático com câmera distal, tela e trajetória do tubo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Videolaringoscopia</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Visão indireta · câmera distal · passagem guiada do tubo</text><rect x="170" y="250" width="450" height="300" rx="28" fill="#1D4E7A"/><rect x="210" y="290" width="370" height="220" rx="18" fill="#F7F4EC"/><path d="M280 440 Q395 300 520 440 Q395 530 280 440" fill="#1696A3"/><path d="M650 780 Q780 520 920 350" fill="none" stroke="#1D4E7A" stroke-width="55" stroke-linecap="round"/><circle cx="920" cy="350" r="22" fill="#D39A2E"/><path d="M720 820 Q860 610 1010 430" fill="none" stroke="#C45A3C" stroke-width="22" stroke-linecap="round"/><path d="M1050 330 Q1240 350 1340 520 Q1390 680 1270 820 Q1100 900 960 800" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M1030 580 Q1140 500 1240 590" fill="none" stroke="#1696A3" stroke-width="26"/><g font-family="sans-serif"><text x="190" y="620" font-size="28" fill="#1D4E7A">Tela: visão laríngea ampliada</text><text x="760" y="900" font-size="28" fill="#C45A3C">Tubo segue a curvatura da lâmina</text><rect x="160" y="930" width="1280" height="150" rx="24" fill="#E8E1D1"/><text x="210" y="990" font-size="25" fill="#2B2E34">Boa visão não garante passagem fácil: alinhar estilete, tubo e geometria da lâmina.</text><text x="210" y="1035" font-size="22" fill="#6A727A">Pré-oxigenação, sucção pronta e plano de resgate permanecem obrigatórios.</text></g></svg>