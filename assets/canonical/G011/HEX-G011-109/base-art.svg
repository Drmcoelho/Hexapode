<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Cricotireoidostomia</title><desc id="d">Localização esquemática da membrana cricotireóidea e sequência conceitual de acesso frontal do pescoço.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Cricotireoidostomia</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Acesso frontal do pescoço em cenário CICO</text><path d="M640 250 Q500 400 540 820 Q650 980 820 820 Q860 500 760 250z" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M650 320 L760 320 L780 430 L630 430z" fill="#1D4E7A"/><path d="M650 510 L760 510 L790 650 L620 650z" fill="#1696A3"/><rect x="645" y="445" width="120" height="55" rx="18" fill="#D39A2E"/><text x="780" y="485" font-family="sans-serif" font-size="25" fill="#D39A2E">membrana cricotireóidea</text><line x1="710" y1="470" x2="980" y2="470" stroke="#D39A2E" stroke-width="8"/><g font-family="sans-serif"><text x="930" y="280" font-size="30" fill="#1D4E7A">Sequência conceitual</text><text x="930" y="350" font-size="25" fill="#2B2E34">1. Identificar a membrana.</text><text x="930" y="405" font-size="25" fill="#2B2E34">2. Incisar pele e membrana.</text><text x="930" y="460" font-size="25" fill="#2B2E34">3. Dilatar e inserir cânula.</text><text x="930" y="515" font-size="25" fill="#2B2E34">4. Confirmar ventilação.</text><rect x="900" y="620" width="560" height="220" rx="24" fill="#E8E1D1"/><text x="940" y="685" font-size="27" fill="#B2473F">Indicação crítica</text><text x="940" y="735" font-size="23" fill="#2B2E34">Não intuba, não oxigena.</text><text x="940" y="785" font-size="21" fill="#6A727A">Procedimento de emergência; exige treinamento prático.</text></g></svg>