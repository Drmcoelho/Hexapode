<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Cormack-Lehane</title><desc id="d">Graus I a IV da visualização laríngea em laringoscopia.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Cormack-Lehane</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Visualização laríngea esquemática</text><g font-family="sans-serif" text-anchor="middle"><g transform="translate(250 430)"><ellipse rx="160" ry="210" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-90 30 Q0 -60 90 30 Q0 100 -90 30" fill="#1696A3"/><text y="285" font-size="32">Grau I</text><text y="325" font-size="21" fill="#6A727A">glote completa</text></g><g transform="translate(600 430)"><ellipse rx="160" ry="210" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-80 40 Q0 -35 80 40 Q0 80 -80 40" fill="#1696A3"/><rect x="0" y="-80" width="150" height="180" fill="#E8E1D1"/><text y="285" font-size="32">Grau II</text><text y="325" font-size="21" fill="#6A727A">glote parcial</text></g><g transform="translate(950 430)"><ellipse rx="160" ry="210" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><path d="M-80 35 Q0 -20 80 35" fill="none" stroke="#C45A3C" stroke-width="18"/><text y="285" font-size="32">Grau III</text><text y="325" font-size="21" fill="#6A727A">apenas epiglote</text></g><g transform="translate(1300 430)"><ellipse rx="160" ry="210" fill="#E8E1D1" stroke="#2B2E34" stroke-width="6"/><line x1="-70" y1="35" x2="70" y2="35" stroke="#B2473F" stroke-width="12" stroke-dasharray="18 14"/><text y="285" font-size="32">Grau IV</text><text y="325" font-size="21" fill="#6A727A">epiglote não visível</text></g></g><rect x="120" y="850" width="1360" height="190" rx="26" fill="#E8E1D1"/><text x="160" y="915" font-family="sans-serif" font-size="28" fill="#1D4E7A">Escala observacional da laringoscopia direta</text><text x="160" y="970" font-family="sans-serif" font-size="23" fill="#2B2E34">Registrar melhor visão obtida e estratégia auxiliar usada; videolaringoscopia não deve ser descrita automaticamente pela mesma lógica.</text></svg>