<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Sequência rápida</title><desc id="d">Fluxo esquemático da sequência rápida de intubação com preparo, pré-oxigenação, indução, bloqueio, intubação e confirmação.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Sequência Rápida</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Fluxo operacional da intubação em emergência</text><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#1D4E7A"/></marker></defs><g font-family="sans-serif" text-anchor="middle"><g transform="translate(180 360)"><circle r="85" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="8"/><text y="-5" font-size="34">1</text><text y="125" font-size="25">Preparar</text></g><g transform="translate(430 360)"><circle r="85" fill="#E8E1D1" stroke="#1696A3" stroke-width="8"/><text y="-5" font-size="34">2</text><text y="125" font-size="25">Pré-oxigenar</text></g><g transform="translate(680 360)"><circle r="85" fill="#E8E1D1" stroke="#C45A3C" stroke-width="8"/><text y="-5" font-size="34">3</text><text y="125" font-size="25">Induzir</text></g><g transform="translate(930 360)"><circle r="85" fill="#E8E1D1" stroke="#D39A2E" stroke-width="8"/><text y="-5" font-size="34">4</text><text y="125" font-size="25">Bloquear</text></g><g transform="translate(1180 360)"><circle r="85" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="8"/><text y="-5" font-size="34">5</text><text y="125" font-size="25">Intubar</text></g><g transform="translate(1430 360)"><circle r="85" fill="#E8E1D1" stroke="#2E7D69" stroke-width="8"/><text y="-5" font-size="34">6</text><text y="125" font-size="25">Confirmar</text></g></g><g stroke="#1D4E7A" stroke-width="10" marker-end="url(#a)"><line x1="270" y1="360" x2="330" y2="360"/><line x1="520" y1="360" x2="580" y2="360"/><line x1="770" y1="360" x2="830" y2="360"/><line x1="1020" y1="360" x2="1080" y2="360"/><line x1="1270" y1="360" x2="1330" y2="360"/></g><g font-family="sans-serif"><rect x="120" y="620" width="1360" height="330" rx="30" fill="#E8E1D1"/><text x="170" y="690" font-size="30" fill="#1D4E7A">Elementos obrigatórios do plano</text><text x="170" y="755" font-size="24" fill="#2B2E34">• monitorização, acesso, sucção, ventilação de resgate e plano CICO;</text><text x="170" y="805" font-size="24" fill="#2B2E34">• escolha hemodinamicamente coerente de indutor e bloqueador;</text><text x="170" y="855" font-size="24" fill="#2B2E34">• confirmação por capnografia e fixação do tubo;</text><text x="170" y="905" font-size="24" fill="#2B2E34">• sedoanalgesia pós-intubação iniciada sem atraso.</text></g></svg>