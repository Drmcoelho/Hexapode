<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Cuff</title><desc id="d">Tubo traqueal com cuff insuflado, pressão adequada e riscos de pressão baixa ou alta.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Cuff</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Vedação traqueal e pressão do balonete</text><rect x="330" y="250" width="360" height="700" rx="170" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><rect x="475" y="180" width="70" height="820" rx="34" fill="#1D4E7A"/><ellipse cx="510" cy="680" rx="150" ry="100" fill="#1696A3" opacity=".65" stroke="#1696A3" stroke-width="8"/><path d="M545 700 Q800 710 870 850" fill="none" stroke="#1D4E7A" stroke-width="18"/><circle cx="900" cy="875" r="45" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="10"/><g font-family="sans-serif"><text x="850" y="310" font-size="30" fill="#1D4E7A">Faixa-alvo usual</text><text x="850" y="370" font-size="54" fill="#2E7D69">20–30 cmH₂O</text><rect x="820" y="450" width="600" height="150" rx="24" fill="#E8E1D1"/><text x="860" y="510" font-size="27" fill="#B2473F">Baixa pressão</text><text x="860" y="555" font-size="22" fill="#2B2E34">vazamento · microaspiração · ventilação ineficaz</text><rect x="820" y="640" width="600" height="150" rx="24" fill="#E8E1D1"/><text x="860" y="700" font-size="27" fill="#D39A2E">Alta pressão</text><text x="860" y="745" font-size="22" fill="#2B2E34">isquemia mucosa · lesão traqueal</text><text x="850" y="900" font-size="22" fill="#6A727A">Medir com manômetro e reavaliar após mudanças de posição.</text></g></svg>