<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Bougie</title><desc id="d">Introdução esquemática de bougie pela glote e passagem subsequente do tubo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Bougie</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Guia flexível para passagem do tubo traqueal</text><path d="M1100 260 Q1260 420 1180 700 Q1060 900 820 850 Q650 760 690 560 Q740 360 930 300" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M860 560 Q960 470 1060 560" fill="none" stroke="#1696A3" stroke-width="28"/><path d="M260 850 Q540 650 850 560 Q980 520 1110 600" fill="none" stroke="#D39A2E" stroke-width="20" stroke-linecap="round"/><path d="M330 900 Q600 760 900 650" fill="none" stroke="#1D4E7A" stroke-width="55" stroke-linecap="round"/><g font-family="sans-serif"><text x="180" y="350" font-size="30" fill="#1D4E7A">Sequência</text><text x="180" y="420" font-size="26" fill="#2B2E34">1. Introduzir o bougie sob visão.</text><text x="180" y="475" font-size="26" fill="#2B2E34">2. Confirmar progressão traqueal.</text><text x="180" y="530" font-size="26" fill="#2B2E34">3. Avançar o tubo sobre o guia.</text><text x="180" y="585" font-size="26" fill="#2B2E34">4. Retirar o bougie e confirmar posição.</text><rect x="140" y="690" width="500" height="180" rx="24" fill="#E8E1D1"/><text x="180" y="750" font-size="24" fill="#B2473F">Evitar força excessiva.</text><text x="180" y="800" font-size="22" fill="#6A727A">Trauma é possível quando o avanço é cego ou resistido.</text></g></svg>