<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Rampa</title><desc id="d">Posicionamento em rampa alinhando meato acústico externo e incisura esternal.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="80" y="110" font-family="serif" font-size="58" fill="#2B2E34">Hexápode — Rampa</text><text x="80" y="160" font-family="sans-serif" font-size="24" fill="#6A727A">Posicionamento para pré-oxigenação e laringoscopia</text><rect x="180" y="760" width="1180" height="90" rx="20" fill="#1D4E7A"/><path d="M290 700 Q430 520 650 520 L1050 620 L1230 760 L300 760z" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><circle cx="440" cy="450" r="120" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><path d="M480 550 Q610 500 720 570" fill="none" stroke="#1696A3" stroke-width="28"/><rect x="300" y="630" width="360" height="90" rx="25" fill="#D39A2E" opacity=".75"/><line x1="420" y1="430" x2="890" y2="430" stroke="#2E7D69" stroke-width="10" stroke-dasharray="22 18"/><circle cx="420" cy="430" r="18" fill="#2E7D69"/><circle cx="890" cy="430" r="18" fill="#2E7D69"/><text x="450" y="395" font-family="sans-serif" font-size="26" fill="#2E7D69">meato acústico externo</text><text x="890" y="395" font-family="sans-serif" font-size="26" fill="#2E7D69">incisura esternal</text><rect x="850" y="220" width="600" height="300" rx="28" fill="#E8E1D1"/><text x="900" y="290" font-family="sans-serif" font-size="30" fill="#1D4E7A">Critério visual</text><text x="900" y="350" font-family="sans-serif" font-size="24" fill="#2B2E34">Elevar cabeça e tronco até alinhar</text><text x="900" y="395" font-family="sans-serif" font-size="24" fill="#2B2E34">o meato acústico externo à incisura esternal.</text><text x="900" y="465" font-family="sans-serif" font-size="22" fill="#6A727A">Especialmente útil em obesidade e gestação.</text></svg>