<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — APRV</title><desc id="d">Ventilação com liberação de pressão e respiração espontânea.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — APRV</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">VENTILAÇÃO COM LIBERAÇÃO DE PRESSÃO</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">Pressão alta prolongada alterna com liberações breves; respiração espontânea é permitida.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">PADRÃO DE PRESSÃO</text><path d="M150 510 L190 510 L210 420 L540 420 L555 510 L585 510 L605 420 L650 420" fill="none" stroke="#1D4E7A" stroke-width="8"/><path d="M150 660 C190 615 225 690 270 645 C310 610 350 685 395 645 C435 610 480 690 535 645 L555 660 C575 745 595 745 605 660 C620 620 635 630 650 645" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 L190 850 C280 760 430 745 540 760 L555 850 C575 795 600 770 650 760" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">P high / T high</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Respiração espontânea + release</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume pulmonar médio elevado</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">DUAS FASES</text><rect x="880" y="435" width="220" height="150" rx="14" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><text x="925" y="505" font-family="Arial" font-size="28">P HIGH</text><rect x="1210" y="470" width="170" height="80" rx="14" fill="#E8E1D1" stroke="#D39A2E" stroke-width="4"/><text x="1240" y="520" font-family="Arial" font-size="25">RELEASE</text><path d="M1110 510 H1190" stroke="#1696A3" stroke-width="7"/><text x="870" y="720" font-family="Arial" font-size="22">T high sustenta recrutamento.</text><text x="870" y="775" font-family="Arial" font-size="22">T low limita desrecrutamento.</text><text x="870" y="830" font-family="Arial" font-size="22">Esforço espontâneo pode ocorrer nas duas fases.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-076 · Ventila · Respira · Emergências</text></svg>