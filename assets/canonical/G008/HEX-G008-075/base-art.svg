<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — PRVC</title><desc id="d">Controle de pressão com volume-alvo e ajuste ciclo a ciclo.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — PRVC</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">CONTROLE DE PRESSÃO COM VOLUME-ALVO</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">A pressão é ajustada ciclo a ciclo para aproximar o volume-alvo.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">ADAPTAÇÃO CICLO A CICLO</text><path d="M150 500 L210 500 L225 420 L330 420 L345 500 L390 500 L405 440 L510 440 L525 500 L570 500 L585 455 L650 455" fill="none" stroke="#1D4E7A" stroke-width="7"/><path d="M150 660 L210 660 L210 605 L330 605 L330 660 C350 705 370 700 390 660 L390 610 L510 610 L510 660 C535 700 555 690 570 660 L570 615 L650 615" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 L210 850 C245 780 290 720 330 720 C350 770 370 820 390 850 C430 775 475 720 510 720 C535 770 555 820 570 850 C600 785 625 740 650 735" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">Pressão decrescente</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Fluxo desacelerado</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume-alvo constante</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">ALGORITMO VISUAL</text><circle cx="960" cy="510" r="85" fill="#E8E1D1" stroke="#C45A3C" stroke-width="4"/><text x="910" y="500" font-family="Arial" font-size="23">VOLUME</text><text x="920" y="535" font-family="Arial" font-size="23">ALVO</text><path d="M1055 510 H1180" stroke="#1696A3" stroke-width="7"/><rect x="1210" y="435" width="200" height="150" rx="14" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><text x="1240" y="500" font-family="Arial" font-size="22">AJUSTE DA</text><text x="1245" y="540" font-family="Arial" font-size="22">PRESSÃO</text><text x="870" y="720" font-family="Arial" font-size="22">Volume abaixo do alvo → pressão sobe.</text><text x="870" y="775" font-family="Arial" font-size="22">Volume acima do alvo → pressão cai.</text><text x="870" y="830" font-family="Arial" font-size="22">Limites e alarmes preservam segurança.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-075 · Ventila · Respira · Emergências</text></svg>