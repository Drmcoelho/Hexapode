<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — BIPAP</title><desc id="d">Pressão positiva em dois níveis durante ventilação espontânea.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — BIPAP</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">PRESSÃO POSITIVA EM DOIS NÍVEIS</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">IPAP e EPAP sustentam a ventilação espontânea em dois patamares de pressão.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">DOIS PATAMARES</text><path d="M150 500 L210 500 L230 430 L390 430 L410 500 L470 500 L490 430 L630 430 L650 500" fill="none" stroke="#1D4E7A" stroke-width="8"/><path d="M150 660 C190 610 220 610 240 660 C270 590 350 590 390 660 C420 715 450 710 470 660 C510 590 590 590 630 660" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 C210 805 260 735 330 730 C390 750 425 815 470 850 C520 790 580 735 630 755" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">IPAP / EPAP</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Fluxo espontâneo assistido</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume variável</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">DIFERENÇA DE PRESSÃO</text><rect x="880" y="440" width="190" height="110" rx="14" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><text x="930" y="505" font-family="Arial" font-size="28">IPAP</text><rect x="1210" y="490" width="190" height="90" rx="14" fill="#E8E1D1" stroke="#1696A3" stroke-width="4"/><text x="1260" y="545" font-family="Arial" font-size="28">EPAP</text><path d="M1080 505 H1190" stroke="#1696A3" stroke-width="7"/><text x="870" y="720" font-family="Arial" font-size="22">Pressão de suporte = IPAP − EPAP.</text><text x="870" y="775" font-family="Arial" font-size="22">EPAP auxilia recrutamento e via aérea.</text><text x="870" y="830" font-family="Arial" font-size="22">IPAP reduz trabalho inspiratório.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-078 · Ventila · Respira · Pediatria</text></svg>