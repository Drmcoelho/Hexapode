<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — VCV</title><desc id="d">Prancha vetorial sobre ventilação controlada a volume, com curvas de pressão, fluxo e volume e mecanismo ventilador-paciente.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="42" y="42" width="1516" height="1116" rx="18" fill="none" stroke="#DCD2BE" stroke-width="2"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — VCV</text><text x="88" y="168" font-family="Arial" font-size="24" letter-spacing="3" fill="#1D4E7A">VENTILAÇÃO CONTROLADA A VOLUME</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34" stroke-width="2"/><text x="90" y="255" font-family="Arial" font-size="25" fill="#2B2E34">Volume e fluxo definidos; pressão resulta da mecânica respiratória.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="375" font-family="Arial" font-size="24" font-weight="700" fill="#2B2E34">CURVAS ESQUEMÁTICAS</text><text x="105" y="435" font-family="Arial" font-size="20" fill="#1D4E7A">Pressão</text><path d="M150 500 L230 500 L250 450 L470 430 L630 455 L650 500" fill="none" stroke="#1D4E7A" stroke-width="7"/><text x="105" y="590" font-family="Arial" font-size="20" fill="#1696A3">Fluxo</text><path d="M150 650 L230 650 L230 600 L470 600 L470 650 C520 735 595 735 640 650" fill="none" stroke="#1696A3" stroke-width="7"/><text x="105" y="780" font-family="Arial" font-size="20" fill="#C45A3C">Volume</text><path d="M150 850 L230 850 C300 850 330 735 470 720 L600 720 C630 760 640 820 650 850" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="560" y="925" font-family="Arial" font-size="20" fill="#2B2E34">Tempo →</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="375" font-family="Arial" font-size="24" font-weight="700" fill="#2B2E34">CONTRATO DO MODO</text><rect x="875" y="435" width="190" height="125" rx="15" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><path d="M900 515 C930 460 970 540 1030 475" fill="none" stroke="#1696A3" stroke-width="6"/><path d="M1090 500 H1190" stroke="#1696A3" stroke-width="7"/><path d="M1220 430 C1280 395 1370 430 1390 505 C1410 590 1340 650 1260 620 C1190 595 1170 490 1220 430Z" fill="#E8E1D1" stroke="#C45A3C" stroke-width="4"/><text x="870" y="720" font-family="Arial" font-size="22" fill="#2B2E34">Controlada: volume corrente</text><text x="870" y="775" font-family="Arial" font-size="22" fill="#2B2E34">Limitada: fluxo e alarmes</text><text x="870" y="830" font-family="Arial" font-size="22" fill="#2B2E34">Ciclada: volume</text><text x="870" y="885" font-family="Arial" font-size="22" fill="#2B2E34">Resultante: pressão</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-071 · ativo canônico · Ventila · Respira · Emergências</text></svg>