<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — VNI</title><desc id="d">Ventilação não invasiva aplicada por interface com preservação da via aérea natural.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — VNI</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">VENTILAÇÃO NÃO INVASIVA</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">Suporte pressórico aplicado por interface, preservando a via aérea natural.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">CURVAS E SINCRONIA</text><path d="M150 500 L215 500 C225 520 235 520 245 500 L265 445 L525 445 L545 500 L585 500 C595 520 605 520 615 500 L635 465" fill="none" stroke="#1D4E7A" stroke-width="7"/><path d="M150 660 C190 600 220 610 245 660 C275 580 420 585 540 650 C570 715 610 700 650 660" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 C190 800 220 810 245 850 C295 750 430 720 545 800 C585 830 620 845 650 850" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">Pressão assistida</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Fluxo variável e possível fuga</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume dependente do paciente</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">INTERFACE E CIRCUITO</text><path d="M900 440 C960 400 1035 430 1050 505 C1065 580 1000 625 930 600 C875 580 855 480 900 440Z" fill="#E8E1D1" stroke="#C45A3C" stroke-width="4"/><path d="M890 500 C850 510 830 545 835 585" fill="none" stroke="#1696A3" stroke-width="10"/><path d="M835 585 C885 610 940 612 990 600" fill="none" stroke="#1D4E7A" stroke-width="6"/><path d="M1070 520 H1190" stroke="#1696A3" stroke-width="7"/><rect x="1210" y="440" width="210" height="150" rx="14" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><text x="1260" y="520" font-family="Arial" font-size="26">VENTILADOR</text><text x="870" y="720" font-family="Arial" font-size="22">Interfaces: nasal, oronasal ou total-face.</text><text x="870" y="775" font-family="Arial" font-size="22">Fuga, conforto e sincronia determinam eficácia.</text><text x="870" y="830" font-family="Arial" font-size="22">Monitorar falha e necessidade de via aérea invasiva.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-080 · Ventila · Respira · Emergências</text></svg>