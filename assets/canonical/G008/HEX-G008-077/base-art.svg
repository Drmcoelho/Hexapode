<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — CPAP</title><desc id="d">Pressão positiva contínua em respiração espontânea.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — CPAP</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">PRESSÃO POSITIVA CONTÍNUA NAS VIAS AÉREAS</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">Uma única pressão positiva é mantida durante todo o ciclo espontâneo.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">RESPIRAÇÃO ESPONTÂNEA SOBRE PEEP</text><path d="M150 500 H650" fill="none" stroke="#1D4E7A" stroke-width="8"/><path d="M150 660 C210 585 270 585 330 660 C390 735 450 735 510 660 C570 585 620 600 650 640" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 C210 790 270 790 330 850 C390 910 450 910 510 850 C570 790 620 805 650 835" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">Pressão constante</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Fluxo espontâneo</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume espontâneo</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">PRINCÍPIO</text><circle cx="1000" cy="520" r="95" fill="#E8E1D1" stroke="#C45A3C" stroke-width="4"/><path d="M930 520 C960 465 1010 465 1040 520 C1070 575 1110 575 1140 520" fill="none" stroke="#1696A3" stroke-width="7"/><text x="1210" y="515" font-family="Arial" font-size="30" fill="#1D4E7A">PEEP ÚNICA</text><text x="870" y="720" font-family="Arial" font-size="22">Sem ciclos mandatórios.</text><text x="870" y="775" font-family="Arial" font-size="22">Recrutamento e redução do colapso expiratório.</text><text x="870" y="830" font-family="Arial" font-size="22">Ventilação depende do esforço do paciente.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-077 · Ventila · Respira · Pediatria</text></svg>