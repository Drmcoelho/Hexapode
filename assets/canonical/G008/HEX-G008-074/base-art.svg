<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — SIMV</title><desc id="d">Ventilação mandatória intermitente sincronizada com ciclos mandatórios e espontâneos.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="85" y="120" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — SIMV</text><text x="88" y="168" font-family="Arial" font-size="24" fill="#1D4E7A">VENTILAÇÃO MANDATÓRIA INTERMITENTE SINCRONIZADA</text><line x1="85" y1="195" x2="1515" y2="195" stroke="#2B2E34"/><text x="90" y="255" font-family="Arial" font-size="25">Ciclos mandatórios sincronizados coexistem com respirações espontâneas.</text><rect x="70" y="320" width="700" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="105" y="380" font-family="Arial" font-size="24" font-weight="700">CURVAS COM DOIS TIPOS DE CICLO</text><path d="M150 500 L210 500 L230 430 L390 430 L410 500 L460 500 C470 515 480 515 490 500 L505 460 L585 460 L600 500 L650 500" fill="none" stroke="#1D4E7A" stroke-width="7"/><path d="M150 660 L210 660 L210 610 L390 610 L390 660 C420 710 445 700 460 660 C480 605 540 615 595 650 L650 660" fill="none" stroke="#1696A3" stroke-width="7"/><path d="M150 850 L210 850 C250 790 320 720 390 720 C415 760 440 820 460 850 C500 790 550 745 600 760 C625 790 640 830 650 850" fill="none" stroke="#C45A3C" stroke-width="7"/><text x="105" y="455" font-family="Arial" font-size="20" fill="#1D4E7A">Pressão</text><text x="105" y="615" font-family="Arial" font-size="20" fill="#1696A3">Fluxo</text><text x="105" y="805" font-family="Arial" font-size="20" fill="#C45A3C">Volume</text><rect x="815" y="320" width="715" height="700" rx="18" fill="#FBF9F3" stroke="#DCD2BE"/><text x="850" y="380" font-family="Arial" font-size="24" font-weight="700">SINCRONIZAÇÃO</text><rect x="870" y="440" width="220" height="130" rx="14" fill="#E8E1D1" stroke="#1D4E7A" stroke-width="4"/><text x="900" y="515" font-family="Arial" font-size="25" fill="#1D4E7A">MANDATÓRIO</text><circle cx="1250" cy="505" r="70" fill="#E8E1D1" stroke="#C45A3C" stroke-width="4"/><text x="1185" y="515" font-family="Arial" font-size="23">ESPONTÂNEO</text><path d="M1095 505 H1170" stroke="#1696A3" stroke-width="7"/><text x="870" y="720" font-family="Arial" font-size="22">Janela de sincronização evita competição.</text><text x="870" y="775" font-family="Arial" font-size="22">Respirações espontâneas podem receber suporte.</text><text x="870" y="830" font-family="Arial" font-size="22">Frequência mandatória mínima permanece definida.</text><text x="90" y="1110" font-family="Arial" font-size="18" fill="#1D4E7A">HEX-G008-074 · Ventila · Respira · Emergências</text></svg>