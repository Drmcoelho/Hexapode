<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">PaO₂</title><desc id="d">Pressão arterial de oxigênio, gradiente alveolar-arterial e limites de interpretação.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">PaO₂</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Oxigenação arterial não é sinônimo de conteúdo total de O₂</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><circle cx="340" cy="435" r="165" fill="#E8E1D1" stroke="#1696A3" stroke-width="6"/><circle cx="340" cy="435" r="95" fill="#1696A3" opacity=".22"/><text x="280" y="425" font-family="sans-serif" font-size="30" fill="#1D4E7A">ALVÉOLO</text><text x="275" y="470" font-family="monospace" font-size="28" fill="#2B2E34">PAO₂</text><path d="M510 435 H690" stroke="#1696A3" stroke-width="12" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1696A3"/></marker></defs><rect x="700" y="305" width="360" height="265" rx="22" fill="white" stroke="#DCD2BE"/><text x="760" y="390" font-family="sans-serif" font-size="30" fill="#B2473F">ARTÉRIA</text><text x="790" y="445" font-family="monospace" font-size="34" fill="#2B2E34">PaO₂</text><text x="720" y="520" font-family="sans-serif" font-size="20" fill="#6A727A">Gradiente A–a = PAO₂ − PaO₂</text><rect x="100" y="650" width="960" height="100" rx="20" fill="white" stroke="#DCD2BE"/><text x="145" y="710" font-family="sans-serif" font-size="23" fill="#2B2E34">Interprete com FiO₂, altitude, idade, PaCO₂ e mecanismo de hipoxemia.</text><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-113 · overlay incorporado · Hexápode</text></svg>