<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Distúrbios mistos</title><desc id="d">Mapa lógico para reconhecer distúrbios ácido-base mistos quando compensação e direção das variáveis não coincidem.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Distúrbios mistos</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Quando duas forças primárias atuam simultaneamente</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><rect x="95" y="225" width="1010" height="120" rx="24" fill="white" stroke="#DCD2BE"/><text x="135" y="278" font-family="sans-serif" font-size="25" fill="#1D4E7A">SUSPEITE DE MISTURA QUANDO:</text><text x="135" y="318" font-family="sans-serif" font-size="21" fill="#2B2E34">a compensação observada excede ou fica aquém da esperada, ou pH parece “normal” apesar de PaCO₂ e HCO₃⁻ muito alterados.</text><rect x="95" y="405" width="300" height="255" rx="22" fill="white" stroke="#DCD2BE"/><text x="125" y="460" font-family="sans-serif" font-size="24" fill="#B2473F">ACIDOSE + ACIDOSE</text><text x="125" y="520" font-family="sans-serif" font-size="21" fill="#2B2E34">PaCO₂ ↑</text><text x="125" y="560" font-family="sans-serif" font-size="21" fill="#2B2E34">HCO₃⁻ ↓</text><text x="125" y="610" font-family="sans-serif" font-size="20" fill="#6A727A">pH cai intensamente</text><rect x="450" y="405" width="300" height="255" rx="22" fill="white" stroke="#DCD2BE"/><text x="480" y="460" font-family="sans-serif" font-size="24" fill="#D39A2E">ACIDOSE + ALCALOSE</text><text x="480" y="520" font-family="sans-serif" font-size="21" fill="#2B2E34">forças opostas</text><text x="480" y="560" font-family="sans-serif" font-size="21" fill="#2B2E34">pH pode aproximar-se do normal</text><text x="480" y="610" font-family="sans-serif" font-size="20" fill="#6A727A">não confundir com ausência de distúrbio</text><rect x="805" y="405" width="300" height="255" rx="22" fill="white" stroke="#DCD2BE"/><text x="835" y="460" font-family="sans-serif" font-size="24" fill="#2E7D69">ALCALOSE + ALCALOSE</text><text x="835" y="520" font-family="sans-serif" font-size="21" fill="#2B2E34">PaCO₂ ↓</text><text x="835" y="560" font-family="sans-serif" font-size="21" fill="#2B2E34">HCO₃⁻ ↑</text><text x="835" y="610" font-family="sans-serif" font-size="20" fill="#6A727A">pH sobe intensamente</text><path d="M245 700 H955" stroke="#1696A3" stroke-width="8"/><circle cx="245" cy="700" r="16" fill="#B2473F"/><circle cx="600" cy="700" r="16" fill="#D39A2E"/><circle cx="955" cy="700" r="16" fill="#2E7D69"/><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-117 · overlay incorporado · Hexápode</text></svg>