<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Lactato</title><desc id="d">Produção, depuração e interpretação dinâmica do lactato em contexto clínico.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Lactato</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Marcador de desequilíbrio metabólico, não sinônimo automático de hipóxia</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><circle cx="250" cy="410" r="125" fill="#C45A3C" opacity=".18" stroke="#C45A3C" stroke-width="6"/><text x="180" y="400" font-family="sans-serif" font-size="26" fill="#C45A3C">PRODUÇÃO</text><text x="150" y="445" font-family="sans-serif" font-size="18" fill="#2B2E34">glicólise · catecolaminas</text><path d="M390 410 H545" stroke="#D39A2E" stroke-width="12" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#D39A2E"/></marker></defs><circle cx="680" cy="410" r="125" fill="#B2473F" opacity=".16" stroke="#B2473F" stroke-width="6"/><text x="625" y="400" font-family="sans-serif" font-size="26" fill="#B2473F">LACTATO</text><text x="620" y="445" font-family="monospace" font-size="22" fill="#2B2E34">sérico</text><path d="M815 410 H955" stroke="#2E7D69" stroke-width="12" marker-end="url(#b)"/><defs><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2E7D69"/></marker></defs><rect x="965" y="305" width="150" height="210" rx="30" fill="#2E7D69" opacity=".17" stroke="#2E7D69" stroke-width="6"/><text x="985" y="390" font-family="sans-serif" font-size="25" fill="#2E7D69">DEPURAÇÃO</text><text x="1000" y="440" font-family="sans-serif" font-size="18" fill="#2B2E34">fígado · rim</text><rect x="100" y="600" width="1000" height="150" rx="24" fill="white" stroke="#DCD2BE"/><text x="145" y="655" font-family="sans-serif" font-size="24" fill="#1D4E7A">INTERPRETAÇÃO DINÂMICA</text><text x="145" y="705" font-family="sans-serif" font-size="21" fill="#2B2E34">Valor isolado + tendência + perfusão + função hepática + catecolaminas + contexto.</text><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-120 · overlay incorporado · Hexápode</text></svg>