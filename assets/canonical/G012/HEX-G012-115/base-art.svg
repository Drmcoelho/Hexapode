<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Excesso de Bases</title><desc id="d">Escala de excesso de bases, déficit e excesso, com interpretação metabólica.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Excesso de Bases</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Estimativa do componente metabólico independente da PaCO₂</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><line x1="140" y1="390" x2="1060" y2="390" stroke="#2B2E34" stroke-width="5"/><rect x="140" y="335" width="390" height="110" rx="18" fill="#B2473F" opacity=".78"/><rect x="530" y="335" width="140" height="110" fill="#2E7D69" opacity=".82"/><rect x="670" y="335" width="390" height="110" rx="18" fill="#1D4E7A" opacity=".72"/><text x="250" y="405" font-family="sans-serif" font-size="26" fill="white">DÉFICIT DE BASE</text><text x="555" y="405" font-family="sans-serif" font-size="26" fill="white">−2 a +2</text><text x="785" y="405" font-family="sans-serif" font-size="26" fill="white">EXCESSO DE BASE</text><text x="130" y="485" font-family="monospace" font-size="20" fill="#6A727A">−15</text><text x="505" y="485" font-family="monospace" font-size="20" fill="#6A727A">−2</text><text x="655" y="485" font-family="monospace" font-size="20" fill="#6A727A">+2</text><text x="1020" y="485" font-family="monospace" font-size="20" fill="#6A727A">+15</text><rect x="105" y="570" width="990" height="150" rx="22" fill="white" stroke="#DCD2BE"/><text x="145" y="625" font-family="sans-serif" font-size="24" fill="#2B2E34">BE negativo → componente metabólico acidótico</text><text x="145" y="675" font-family="sans-serif" font-size="24" fill="#2B2E34">BE positivo → componente metabólico alcalótico</text><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-115 · overlay incorporado · Hexápode</text></svg>