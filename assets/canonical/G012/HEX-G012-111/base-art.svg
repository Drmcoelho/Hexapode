<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">pH</title><desc id="d">Escala ácido-base com faixa fisiológica e relação logarítmica entre hidrogênio e pH.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">pH</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Acidez, alcalinidade e distância da normalidade</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><rect x="95" y="245" width="1010" height="105" rx="18" fill="#E8E1D1"/><rect x="95" y="245" width="390" height="105" rx="18" fill="#B2473F" opacity=".78"/><rect x="485" y="245" width="225" height="105" fill="#2E7D69" opacity=".82"/><rect x="710" y="245" width="395" height="105" rx="18" fill="#1D4E7A" opacity=".72"/><text x="245" y="310" fill="white" font-size="26" font-family="sans-serif">ACIDEMIA</text><text x="535" y="310" fill="white" font-size="26" font-family="sans-serif">7,35–7,45</text><text x="855" y="310" fill="white" font-size="26" font-family="sans-serif">ALCALEMIA</text><g font-family="sans-serif" fill="#2B2E34"><text x="105" y="392" font-size="20">7,0</text><text x="465" y="392" font-size="20">7,35</text><text x="690" y="392" font-size="20">7,45</text><text x="1060" y="392" font-size="20">7,8</text></g><rect x="90" y="475" width="500" height="265" rx="22" fill="white" stroke="#DCD2BE"/><text x="125" y="530" font-family="sans-serif" font-size="27" fill="#1D4E7A">RELAÇÃO LOGARÍTMICA</text><text x="125" y="610" font-family="serif" font-size="46" fill="#2B2E34">pH = −log₁₀[H⁺]</text><text x="125" y="665" font-family="sans-serif" font-size="22" fill="#6A727A">Pequena variação numérica = grande mudança de H⁺</text><rect x="630" y="475" width="475" height="265" rx="22" fill="white" stroke="#DCD2BE"/><text x="665" y="530" font-family="sans-serif" font-size="27" fill="#C45A3C">LEITURA CLÍNICA</text><text x="665" y="590" font-family="sans-serif" font-size="22" fill="#2B2E34">1. Identifique acidemia ou alcalemia</text><text x="665" y="635" font-family="sans-serif" font-size="22" fill="#2B2E34">2. Defina o processo primário</text><text x="665" y="680" font-family="sans-serif" font-size="22" fill="#2B2E34">3. Avalie compensação e mistura</text><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-111 · overlay incorporado · Hexápode</text></svg>