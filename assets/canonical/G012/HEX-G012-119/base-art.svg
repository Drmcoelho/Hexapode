<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Ânion Gap</title><desc id="d">Ânion gap calculado, correção pela albumina e distinção entre acidose metabólica com gap alto ou normal.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Ânion Gap</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Estimativa indireta dos ânions não mensurados</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><rect x="90" y="220" width="1020" height="145" rx="24" fill="white" stroke="#DCD2BE"/><text x="145" y="280" font-family="serif" font-size="42" fill="#2B2E34">AG = Na⁺ − (Cl⁻ + HCO₃⁻)</text><text x="145" y="330" font-family="sans-serif" font-size="21" fill="#6A727A">A faixa de referência depende do método laboratorial e do uso de K⁺.</text><rect x="90" y="420" width="475" height="285" rx="24" fill="white" stroke="#DCD2BE"/><text x="130" y="480" font-family="sans-serif" font-size="28" fill="#B2473F">AG ELEVADO</text><text x="130" y="535" font-family="sans-serif" font-size="21" fill="#2B2E34">Acúmulo de ácidos não mensurados</text><text x="130" y="585" font-family="sans-serif" font-size="21" fill="#2B2E34">Lactato · cetonas · toxinas · retenção urêmica</text><text x="130" y="645" font-family="sans-serif" font-size="20" fill="#6A727A">Calcule delta gap quando necessário</text><rect x="635" y="420" width="475" height="285" rx="24" fill="white" stroke="#DCD2BE"/><text x="675" y="480" font-family="sans-serif" font-size="28" fill="#1D4E7A">AG NORMAL</text><text x="675" y="535" font-family="sans-serif" font-size="21" fill="#2B2E34">Perda de bicarbonato com aumento de cloro</text><text x="675" y="585" font-family="sans-serif" font-size="21" fill="#2B2E34">Diarreia · acidose tubular renal · solução salina</text><text x="675" y="645" font-family="sans-serif" font-size="20" fill="#6A727A">Padrão hiperclorêmico</text><rect x="230" y="745" width="740" height="55" rx="14" fill="#E8E1D1"/><text x="280" y="782" font-family="monospace" font-size="21" fill="#2B2E34">AG corrigido ≈ AG + 2,5 × (4 − albumina g/dL)</text><text x="70" y="850" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-119 · overlay incorporado · Hexápode</text></svg>