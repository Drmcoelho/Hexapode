<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Compensações</title><desc id="d">Regras visuais de compensação esperada para distúrbios respiratórios e metabólicos.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Compensações</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Resposta previsível não normaliza completamente o pH</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><g font-family="sans-serif"><rect x="80" y="215" width="500" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="120" y="270" font-size="27" fill="#B2473F">ACIDOSE METABÓLICA</text><text x="120" y="330" font-family="monospace" font-size="25" fill="#2B2E34">PaCO₂ esperada ≈ 1,5 × HCO₃⁻ + 8 ± 2</text><text x="120" y="390" font-size="20" fill="#6A727A">Fora da faixa → componente respiratório associado</text><rect x="620" y="215" width="500" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="660" y="270" font-size="27" fill="#2E7D69">ALCALOSE METABÓLICA</text><text x="660" y="330" font-size="22" fill="#2B2E34">PaCO₂ sobe de modo limitado</text><text x="660" y="380" font-size="20" fill="#6A727A">Hipoventilação excessiva sugere mistura</text><rect x="80" y="495" width="500" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="120" y="550" font-size="27" fill="#1D4E7A">DISTÚRBIO RESPIRATÓRIO AGUDO</text><text x="120" y="610" font-size="22" fill="#2B2E34">HCO₃⁻ muda pouco por 10 mmHg de PaCO₂</text><text x="120" y="665" font-size="20" fill="#6A727A">Predomina tamponamento imediato</text><rect x="620" y="495" width="500" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="660" y="550" font-size="27" fill="#1696A3">DISTÚRBIO RESPIRATÓRIO CRÔNICO</text><text x="660" y="610" font-size="22" fill="#2B2E34">HCO₃⁻ muda mais por adaptação renal</text><text x="660" y="665" font-size="20" fill="#6A727A">Tempo é variável diagnóstica</text></g><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-118 · overlay incorporado · Hexápode</text></svg>