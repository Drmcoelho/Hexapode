<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Distúrbios simples</title><desc id="d">Matriz dos quatro distúrbios ácido-base simples segundo pH, PaCO2 e bicarbonato.</desc><rect width="1200" height="900" fill="#F7F4EC"/><text x="70" y="90" font-family="serif" font-size="58" fill="#2B2E34">Distúrbios simples</text><text x="72" y="132" font-family="sans-serif" font-size="22" fill="#6A727A">Identifique a direção do pH e a variável primária que a explica</text><line x1="70" y1="160" x2="1130" y2="160" stroke="#DCD2BE"/><g font-family="sans-serif"><rect x="90" y="220" width="480" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="130" y="280" font-size="28" fill="#B2473F">ACIDOSE RESPIRATÓRIA</text><text x="130" y="340" font-size="24" fill="#2B2E34">pH ↓ · PaCO₂ ↑</text><text x="130" y="390" font-size="21" fill="#6A727A">HCO₃⁻ sobe se houver compensação</text><rect x="630" y="220" width="480" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="670" y="280" font-size="28" fill="#1D4E7A">ALCALOSE RESPIRATÓRIA</text><text x="670" y="340" font-size="24" fill="#2B2E34">pH ↑ · PaCO₂ ↓</text><text x="670" y="390" font-size="21" fill="#6A727A">HCO₃⁻ cai se houver compensação</text><rect x="90" y="505" width="480" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="130" y="565" font-size="28" fill="#C45A3C">ACIDOSE METABÓLICA</text><text x="130" y="625" font-size="24" fill="#2B2E34">pH ↓ · HCO₃⁻ ↓</text><text x="130" y="675" font-size="21" fill="#6A727A">PaCO₂ cai se houver compensação</text><rect x="630" y="505" width="480" height="235" rx="24" fill="white" stroke="#DCD2BE"/><text x="670" y="565" font-size="28" fill="#2E7D69">ALCALOSE METABÓLICA</text><text x="670" y="625" font-size="24" fill="#2B2E34">pH ↑ · HCO₃⁻ ↑</text><text x="670" y="675" font-size="21" fill="#6A727A">PaCO₂ sobe se houver compensação</text></g><text x="70" y="840" font-family="monospace" font-size="18" fill="#6A727A">HEX-G012-116 · overlay incorporado · Hexápode</text></svg>