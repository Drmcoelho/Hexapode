<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Difusão</title><desc>Movimento de gases através da membrana alvéolo-capilar segundo gradientes de pressão parcial.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Difusão</text><rect x="230" y="300" width="1140" height="130" rx="30" fill="#E8E1D1" stroke="#2B2E34" stroke-width="8"/><rect x="230" y="700" width="1140" height="130" rx="30" fill="#1D4E7A" opacity="0.18" stroke="#1D4E7A" stroke-width="8"/><g stroke-width="24"><path d="M500 455 V670" stroke="#1696A3"/><path d="M760 455 V670" stroke="#1696A3"/><path d="M1100 670 V455" stroke="#B2473F"/></g><text x="260" y="375" font-size="36" fill="#2B2E34">Alvéolo</text><text x="260" y="780" font-size="36" fill="#1D4E7A">Capilar</text><text x="450" y="610" font-size="30" fill="#1696A3">O₂</text><text x="1060" y="610" font-size="30" fill="#B2473F">CO₂</text><text x="230" y="940" font-size="32" fill="#6A727A">Fluxo depende de área, espessura, coeficiente de difusão e gradiente.</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-046 · Hexápode</text></svg>