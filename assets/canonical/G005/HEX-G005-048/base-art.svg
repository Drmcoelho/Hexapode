<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Transporte de CO₂</title><desc>CO₂ transportado como bicarbonato, carbamino e dissolvido.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Transporte de CO₂</text><g font-size="38"><rect x="180" y="280" width="390" height="430" rx="34" fill="#1696A3" opacity="0.18"/><text x="260" y="390" fill="#2B2E34">Bicarbonato</text><text x="310" y="520" font-size="72" fill="#1696A3">HCO₃⁻</text><text x="235" y="620" font-size="28" fill="#6A727A">forma predominante</text><rect x="610" y="280" width="390" height="430" rx="34" fill="#B2473F" opacity="0.16"/><text x="700" y="390" fill="#2B2E34">Carbamino</text><text x="730" y="520" font-size="72" fill="#B2473F">Hb–CO₂</text><text x="695" y="620" font-size="28" fill="#6A727A">ligado a proteínas</text><rect x="1040" y="280" width="390" height="430" rx="34" fill="#E8E1D1"/><text x="1140" y="390" fill="#2B2E34">Dissolvido</text><text x="1180" y="520" font-size="72" fill="#1D4E7A">CO₂</text><text x="1115" y="620" font-size="28" fill="#6A727A">fração plasmática</text></g><text x="210" y="880" font-size="34" fill="#6A727A">Nos eritrócitos, anidrase carbônica acelera CO₂ + H₂O ⇄ H₂CO₃ ⇄ H⁺ + HCO₃⁻.</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-048 · Hexápode</text></svg>