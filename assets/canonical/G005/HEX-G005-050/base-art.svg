<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Efeito Bohr</title><desc>Deslocamento da curva de dissociação da hemoglobina por pH e CO₂.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Efeito Bohr</text><line x1="220" y1="900" x2="1380" y2="900" stroke="#2B2E34" stroke-width="8"/><line x1="220" y1="900" x2="220" y2="220" stroke="#2B2E34" stroke-width="8"/><path d="M250 880 C430 850 500 700 620 500 C760 280 990 240 1330 235" fill="none" stroke="#1696A3" stroke-width="22"/><path d="M320 880 C520 850 610 730 750 540 C900 340 1090 280 1360 260" fill="none" stroke="#B2473F" stroke-width="22"/><text x="940" y="420" font-size="32" fill="#1696A3">esquerda: ↑ afinidade</text><text x="830" y="650" font-size="32" fill="#B2473F">direita: ↓ afinidade, ↑ liberação de O₂</text><rect x="300" y="240" width="430" height="170" rx="30" fill="#E8E1D1"/><text x="350" y="310" font-size="30" fill="#2B2E34">↑ CO₂ · ↓ pH · ↑ temperatura</text><text x="350" y="365" font-size="30" fill="#B2473F">deslocamento à direita</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-050 · Hexápode</text></svg>