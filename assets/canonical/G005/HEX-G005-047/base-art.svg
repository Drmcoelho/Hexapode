<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Transporte de O₂</title><desc>Oxigênio transportado principalmente ligado à hemoglobina, com pequena fração dissolvida.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Transporte de O₂</text><g transform="translate(300 300)"><circle cx="300" cy="300" r="250" fill="#B2473F" opacity="0.2" stroke="#B2473F" stroke-width="14"/><circle cx="300" cy="300" r="150" fill="#B2473F"/><text x="245" y="320" font-size="72" fill="#F7F4EC">Hb</text><g fill="#1696A3"><circle cx="300" cy="65" r="36"/><circle cx="535" cy="300" r="36"/><circle cx="300" cy="535" r="36"/><circle cx="65" cy="300" r="36"/></g></g><rect x="900" y="330" width="430" height="170" rx="30" fill="#E8E1D1"/><text x="960" y="410" font-size="38" fill="#2B2E34">Ligado à Hb</text><text x="960" y="460" font-size="30" fill="#6A727A">componente dominante</text><rect x="900" y="560" width="430" height="170" rx="30" fill="#E8E1D1"/><text x="960" y="640" font-size="38" fill="#2B2E34">Dissolvido</text><text x="960" y="690" font-size="30" fill="#6A727A">fração pequena</text><text x="240" y="930" font-size="32" fill="#6A727A">Conteúdo arterial depende de Hb, saturação e PaO₂.</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-047 · Hexápode</text></svg>