<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Ventilação</title><desc>Entrada e saída de ar entre atmosfera e alvéolos.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Ventilação</text><g fill="none" stroke="#1696A3" stroke-width="18"><path d="M180 300 C420 220 540 360 700 420"/><path d="M180 520 C420 600 540 470 700 430"/></g><g fill="#E8E1D1" stroke="#2B2E34" stroke-width="10"><ellipse cx="1020" cy="520" rx="220" ry="300"/><ellipse cx="1320" cy="520" rx="220" ry="300"/></g><path d="M700 430 C880 430 900 500 1020 520 M700 430 C880 430 1100 500 1320 520" fill="none" stroke="#1696A3" stroke-width="20"/><text x="180" y="720" font-size="34" fill="#6A727A">Atmosfera → vias aéreas → alvéolos</text><text x="180" y="790" font-size="30" fill="#6A727A">Movimento de gás; não equivale, isoladamente, à troca gasosa.</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-041 · Hexápode</text></svg>