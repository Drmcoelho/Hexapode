<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img"><title>Perfusão</title><desc>Fluxo sanguíneo pulmonar do ventrículo direito aos capilares alveolares.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><text x="90" y="110" font-size="58" fill="#2B2E34">Perfusão</text><path d="M250 650 C420 300 720 260 900 520 C1080 790 1310 700 1430 430" fill="none" stroke="#1D4E7A" stroke-width="34"/><g fill="#B2473F"><circle cx="350" cy="545" r="24"/><circle cx="520" cy="390" r="24"/><circle cx="720" cy="370" r="24"/><circle cx="900" cy="520" r="24"/><circle cx="1100" cy="690" r="24"/><circle cx="1320" cy="590" r="24"/></g><g fill="none" stroke="#1696A3" stroke-width="8"><circle cx="820" cy="520" r="170"/><circle cx="1060" cy="520" r="170"/></g><text x="180" y="860" font-size="34" fill="#6A727A">Débito pulmonar distribui sangue aos capilares alveolares.</text><text x="180" y="930" font-size="30" fill="#6A727A">A distribuição regional depende de pressão, gravidade e resistência vascular.</text><text x="90" y="1120" font-size="24" fill="#6A727A">HEX-G005-042 · Hexápode</text></svg>