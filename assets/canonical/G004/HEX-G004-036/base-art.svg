<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Elastância</title><desc id="d">Tendência do sistema respiratório de retornar ao volume de repouso, inversa da complacência.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="32" y="32" width="1536" height="1136" rx="18" fill="none" stroke="#DCD2BE" stroke-width="3"/><text x="72" y="115" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Elastância</text><text x="74" y="165" font-family="Arial" font-size="24" letter-spacing="4" fill="#6A727A">MECÂNICA RESPIRATÓRIA · ATIVO CANÔNICO</text><line x1="70" y1="205" x2="1530" y2="205" stroke="#DCD2BE" stroke-width="3"/><rect x="70" y="245" width="790" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><line x1="210" y1="820" x2="740" y2="820" stroke="#6A727A" stroke-width="4"/><line x1="210" y1="820" x2="210" y2="330" stroke="#6A727A" stroke-width="4"/><path d="M230 790C350 750 500 640 690 390" fill="none" stroke="#C45A3C" stroke-width="12"/><path d="M230 790C430 740 590 700 700 650" fill="none" stroke="#1D4E7A" stroke-width="8" stroke-dasharray="18 14"/><text x="450" y="420" font-family="Arial" font-size="26" fill="#C45A3C">Alta elastância</text><text x="500" y="720" font-family="Arial" font-size="24" fill="#1D4E7A">Baixa elastância</text><text x="640" y="865" font-family="Arial" font-size="22" fill="#6A727A">Volume</text><text x="130" y="540" font-family="Arial" font-size="22" fill="#6A727A" transform="rotate(-90 130 540)">Pressão</text><rect x="900" y="245" width="630" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><text x="940" y="300" font-family="Arial" font-size="22" font-weight="bold" fill="#1D4E7A">RELAÇÕES-CHAVE</text><text x="940" y="390" font-family="Arial" font-size="31" fill="#2B2E34">E = ΔP / ΔV</text><text x="940" y="505" font-family="Arial" font-size="31" fill="#2B2E34">Recuo elástico</text><text x="940" y="620" font-family="Arial" font-size="31" fill="#2B2E34">Alta em pulmão rígido</text><rect x="70" y="975" width="1460" height="130" rx="14" fill="#E8E1D1"/><text x="105" y="1025" font-family="Arial" font-size="22" font-weight="bold" fill="#2B2E34">FUNÇÃO DIDÁTICA</text><text x="105" y="1065" font-family="Arial" font-size="24" fill="#2B2E34">Compara a pressão necessária para produzir a mesma variação de volume.</text><text x="1290" y="1070" font-family="Arial" font-size="20" fill="#6A727A">HEX-G004-036</text></svg>