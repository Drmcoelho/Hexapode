<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Pressão alveolar</title><desc id="d">Oscilação da pressão alveolar ao redor da pressão atmosférica durante inspiração e expiração.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="32" y="32" width="1536" height="1136" rx="18" fill="none" stroke="#DCD2BE" stroke-width="3"/><text x="72" y="115" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Pressão alveolar</text><text x="74" y="165" font-family="Arial" font-size="24" letter-spacing="4" fill="#6A727A">MECÂNICA RESPIRATÓRIA · ATIVO CANÔNICO</text><line x1="70" y1="205" x2="1530" y2="205" stroke="#DCD2BE" stroke-width="3"/><rect x="70" y="245" width="790" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><line x1="190" y1="570" x2="760" y2="570" stroke="#DCD2BE" stroke-width="4"/><line x1="190" y1="800" x2="190" y2="340" stroke="#6A727A" stroke-width="4"/><polyline points="190,570 300,510 410,545 480,570 590,635 680,600 760,570" fill="none" stroke="#1696A3" stroke-width="12"/><text x="120" y="560" font-family="Arial" font-size="22" fill="#6A727A">Patm</text><text x="220" y="830" font-family="Arial" font-size="22" fill="#6A727A">Inspiração</text><text x="625" y="830" font-family="Arial" font-size="22" fill="#6A727A">Expiração</text><rect x="900" y="245" width="630" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><text x="940" y="300" font-family="Arial" font-size="22" font-weight="bold" fill="#1D4E7A">RELAÇÕES-CHAVE</text><text x="940" y="390" font-family="Arial" font-size="31" fill="#2B2E34">Zero no repouso</text><text x="940" y="505" font-family="Arial" font-size="31" fill="#2B2E34">Negativa na inspiração</text><text x="940" y="620" font-family="Arial" font-size="31" fill="#2B2E34">Positiva na expiração</text><rect x="70" y="975" width="1460" height="130" rx="14" fill="#E8E1D1"/><text x="105" y="1025" font-family="Arial" font-size="22" font-weight="bold" fill="#2B2E34">FUNÇÃO DIDÁTICA</text><text x="105" y="1065" font-family="Arial" font-size="24" fill="#2B2E34">Mostra como pequenos gradientes em torno de Patm determinam a direção do fluxo.</text><text x="1290" y="1070" font-family="Arial" font-size="20" fill="#6A727A">HEX-G004-034</text></svg>