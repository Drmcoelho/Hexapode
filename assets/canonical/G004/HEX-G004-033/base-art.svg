th="1460" height="130" rx="14" fill="#E8E1D1"/><text x="105" y="1025" font-family="Arial" font-size="22" font-weight="bold" fill="#2B2E34">FUNÇÃO DIDÁTICA</text><text x="105" y="1065" font-family="Arial" font-size="24" fill="#2B2E34">Relaciona pressão pleural, expansão pulmonar e fase do ciclo respiratório.</text><text x="1290" y="1070" font-family="Arial" font-size="20" fill="#6A727A">HEX-G004-033</text></svg>