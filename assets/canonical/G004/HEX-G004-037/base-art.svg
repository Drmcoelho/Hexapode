<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Complacência</title><desc id="d">Variação de volume obtida por unidade de pressão aplicada ao sistema respiratório.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="32" y="32" width="1536" height="1136" rx="18" fill="none" stroke="#DCD2BE" stroke-width="3"/><text x="72" y="115" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Complacência</text><text x="74" y="165" font-family="Arial" font-size="24" letter-spacing="4" fill="#6A727A">MECÂNICA RESPIRATÓRIA · ATIVO CANÔNICO</text><line x1="70" y1="205" x2="1530" y2="205" stroke="#DCD2BE" stroke-width="3"/><rect x="70" y="245" width="790" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><line x1="210" y1="820" x2="740" y2="820" stroke="#6A727A" stroke-width="4"/><line x1="210" y1="820" x2="210" y2="330" stroke="#6A727A" stroke-width="4"/><path d="M230 790C340 700 470 530 690 370" fill="none" stroke="#2E7D69" stroke-width="12"/><path d="M230 790C430 760 590 700 700 620" fill="none" stroke="#B2473F" stroke-width="8" stroke-dasharray="18 14"/><text x="455" y="410" font-family="Arial" font-size="26" fill="#2E7D69">Alta complacência</text><text x="500" y="690" font-family="Arial" font-size="24" fill="#B2473F">Baixa complacência</text><text x="640" y="865" font-family="Arial" font-size="22" fill="#6A727A">Pressão</text><text x="130" y="540" font-family="Arial" font-size="22" fill="#6A727A" transform="rotate(-90 130 540)">Volume</text><rect x="900" y="245" width="630" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><text x="940" y="300" font-family="Arial" font-size="22" font-weight="bold" fill="#1D4E7A">RELAÇÕES-CHAVE</text><text x="940" y="390" font-family="Arial" font-size="31" fill="#2B2E34">C = ΔV / ΔP</text><text x="940" y="505" font-family="Arial" font-size="31" fill="#2B2E34">Inclinação da curva</text><text x="940" y="620" font-family="Arial" font-size="31" fill="#2B2E34">Baixa em pulmão rígido</text><rect x="70" y="975" width="1460" height="130" rx="14" fill="#E8E1D1"/><text x="105" y="1025" font-family="Arial" font-size="22" font-weight="bold" fill="#2B2E34">FUNÇÃO DIDÁTICA</text><text x="105" y="1065" font-family="Arial" font-size="24" fill="#2B2E34">Demonstra quanto volume é obtido para determinada variação de pressão.</text><text x="1290" y="1070" font-family="Arial" font-size="20" fill="#6A727A">HEX-G004-037</text></svg>