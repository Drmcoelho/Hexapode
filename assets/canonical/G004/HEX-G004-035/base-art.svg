<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d"><title id="t">Hexápode — Pressão transpulmonar</title><desc id="d">Diferença entre pressão alveolar e pleural que mantém o pulmão distendido.</desc><rect width="1600" height="1200" fill="#F7F4EC"/><rect x="32" y="32" width="1536" height="1136" rx="18" fill="none" stroke="#DCD2BE" stroke-width="3"/><text x="72" y="115" font-family="Georgia" font-size="62" fill="#2B2E34">Hexápode — Pressão transpulmonar</text><text x="74" y="165" font-family="Arial" font-size="24" letter-spacing="4" fill="#6A727A">MECÂNICA RESPIRATÓRIA · ATIVO CANÔNICO</text><line x1="70" y1="205" x2="1530" y2="205" stroke="#DCD2BE" stroke-width="3"/><rect x="70" y="245" width="790" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><ellipse cx="420" cy="560" rx="180" ry="250" fill="#D77A6D" stroke="#2B2E34" stroke-width="6"/><ellipse cx="420" cy="560" rx="225" ry="300" fill="none" stroke="#1D4E7A" stroke-width="10"/><path d="M420 560h180" stroke="#2E7D69" stroke-width="12"/><polygon points="600,560 565,540 565,580" fill="#2E7D69"/><text x="290" y="535" font-family="Arial" font-size="28" fill="#2B2E34">PAlv</text><text x="600" y="535" font-family="Arial" font-size="28" fill="#1D4E7A">Ppl</text><text x="250" y="900" font-family="Arial" font-size="42" font-weight="bold" fill="#2E7D69">Pₗ = PAlv − Ppl</text><rect x="900" y="245" width="630" height="690" rx="20" fill="#FCFAF5" stroke="#DCD2BE" stroke-width="3"/><text x="940" y="300" font-family="Arial" font-size="22" font-weight="bold" fill="#1D4E7A">RELAÇÕES-CHAVE</text><text x="940" y="390" font-family="Arial" font-size="31" fill="#2B2E34">Gradiente distensor</text><text x="940" y="505" font-family="Arial" font-size="31" fill="#2B2E34">Mantém o pulmão aberto</text><text x="940" y="620" font-family="Arial" font-size="31" fill="#2B2E34">Aumenta na inspiração</text><rect x="70" y="975" width="1460" height="130" rx="14" fill="#E8E1D1"/><text x="105" y="1025" font-family="Arial" font-size="22" font-weight="bold" fill="#2B2E34">FUNÇÃO DIDÁTICA</text><text x="105" y="1065" font-family="Arial" font-size="24" fill="#2B2E34">Representa o gradiente que determina a distensão pulmonar.</text><text x="1290" y="1070" font-family="Arial" font-size="20" fill="#6A727A">HEX-G004-035</text></svg>